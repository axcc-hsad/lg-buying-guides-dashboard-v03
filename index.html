<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA DASHBOARD - LG.COM Lineup Guide / Feature Library</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
/* =========== DARK THEME (default) =========== */
:root, [data-theme="dark"] {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text2: #8888a0;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --chart-grid: rgba(42,42,58,0.5);
  --chart-text: #8888a0;
  --hover-row: rgba(99,102,241,0.03);
}

/* =========== LIGHT THEME =========== */
[data-theme="light"] {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f3;
  --border: #e0e0e6;
  --text: #1a1a2e;
  --text2: #6b6b80;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #ca8a04;
  --orange: #ea580c;
  --chart-grid: rgba(0,0,0,0.06);
  --chart-text: #6b6b80;
  --hover-row: rgba(79,70,229,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}

.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent2); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-actions .last-updated {
  font-size: 12px;
  color: var(--text2);
  margin-right: 4px;
}

/* Toggle pill buttons */
.toggle-group {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.toggle-group button {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.toggle-group button.active {
  background: var(--accent);
  color: #fff;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
.btn-outline.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.filters { display: grid; gap: 10px; margin-bottom: 24px; }
.filter-level {
  display: grid;
  gap: 8px;
}
.filter-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
}
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.top-nav-row {
  display: flex;
  align-items: stretch;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.month-picker {
  position: relative;
  min-width: 0;
}

.month-picker-trigger {
  width: auto;
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  height: 44px;
  padding: 0 18px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(90, 134, 234, 0.04);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  box-shadow: none;
}

.month-picker-trigger .month-trigger-main {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.month-picker-trigger .month-trigger-copy {
  display: inline-flex;
  align-items: center;
}

.month-picker-trigger .month-trigger-value {
  font-size: 13px;
  line-height: 1;
  color: currentColor;
}

.month-picker-trigger .caret {
  color: var(--text2);
  transition: transform .2s ease;
  display: inline-flex;
  align-items: center;
}

.month-picker.open .month-picker-trigger .caret {
  transform: rotate(180deg);
}

.month-picker-trigger:hover {
  background: rgba(90, 134, 234, 0.08);
  color: var(--text);
}

.month-picker-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
  display: none;
  z-index: 120;
}

.month-picker.open .month-picker-menu {
  display: block;
}

.month-picker-option {
  width: 100%;
  border: none;
  background: transparent;
  color: var(--text);
  padding: 10px 12px;
  border-radius: 10px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
}

.month-picker-option:hover,
.month-picker-option.active {
  background: rgba(99, 102, 241, 0.08);
  color: var(--accent2);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(124,181,255,0.12));
}
.kpi-card.down::before { background: linear-gradient(90deg, rgba(239,68,68,0.95), rgba(239,68,68,0.10)); }
.kpi-card.neutral::before { background: linear-gradient(90deg, rgba(148,163,184,0.9), rgba(148,163,184,0.10)); }
.kpi-card .kpi-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 700; }
.kpi-card .kpi-sub-label { font-size: 11px; color: var(--text2); margin-bottom: 14px; font-weight: 600; }
.kpi-card .kpi-value { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; }
.kpi-card .kpi-change { font-size: 12px; margin-top: 10px; }
.kpi-card .kpi-note { margin-top: 10px; font-size: 12px; color: var(--text2); font-weight: 600; }
.kpi-card .kpi-status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  height: 24px;
  padding: 0 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.01em;
  border: 1px solid transparent;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1;
}
.kpi-card .kpi-status-badge.up { background: rgba(34,197,94,0.10); border-color: rgba(34,197,94,0.24); color: var(--green); }
.kpi-card .kpi-status-badge.down { background: rgba(234,179,8,0.10); border-color: rgba(234,179,8,0.24); color: var(--yellow); }
.kpi-card .kpi-status-badge.neutral { background: rgba(148,163,184,0.10); border-color: rgba(148,163,184,0.18); color: #cbd5e1; }
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }
.kpi-change.neutral { color: var(--text2); }

.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.section-title .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(99,102,241,0.15); color: var(--accent2);
}

.charts-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; margin-bottom: 32px;
}

@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; transition: background 0.2s;
}

.chart-card h3 { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
.chart-card canvas { max-height: 280px; }

.insights-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px; margin-bottom: 32px;
}

.insight-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; border-left: 3px solid;
}

.insight-card.warning { border-left-color: var(--yellow); }
.insight-card.success { border-left-color: var(--green); }
.insight-card.traffic { border-left-color: var(--accent); }
.insight-card.info { border-left-color: var(--text2); }

.insight-card .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.insight-card .priority-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; text-transform: uppercase;
}

.priority-badge.high { background: rgba(239,68,68,0.2); color: var(--red); }
.priority-badge.medium { background: rgba(234,179,8,0.2); color: var(--yellow); }

.insight-card .insight-page { font-size: 12px; font-weight: 600; color: var(--accent2); }
.insight-card .insight-text { font-size: 13px; color: var(--text); line-height: 1.6; }

.action-items {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 32px;
}

.action-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }

.action-item .action-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; font-weight: 700;
}

.action-icon.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
.action-icon.improve { background: rgba(234,179,8,0.15); color: var(--yellow); }
.action-icon.monitor { background: rgba(99,102,241,0.15); color: var(--accent2); }

.action-item .action-text { font-size: 13px; color: var(--text); }
.action-item .action-text strong { color: var(--accent2); }

.status-table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow-x: auto; margin-bottom: 32px;
}

.status-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.status-table th {
  background: var(--surface2); padding: 10px 14px; text-align: left;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.status-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.status-table tr:last-child td { border-bottom: none; }
.status-table tr:hover { background: var(--hover-row); }

.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.status-badge.live { background: rgba(34,197,94,0.15); color: var(--green); }
.status-badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
.status-badge.none { background: rgba(136,136,160,0.1); color: var(--text2); }

.comparison-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.comparison-table th {
  background: var(--surface2); padding: 10px 14px; text-align: right;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.comparison-table th:first-child { text-align: left; }

.comparison-table td {
  padding: 10px 14px; text-align: right;
  border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums;
}

.comparison-table td:first-child { text-align: left; font-weight: 500; }

.tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}

.tab {
  padding: 8px 16px; border-radius: 8px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}

.tab.active { background: var(--accent); color: white; }
.tab:hover:not(.active) { color: var(--text); }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px; font-size: 13px;
  z-index: 200; opacity: 0; transform: translateY(10px); transition: all 0.3s;
}

.toast.show { opacity: 1; transform: translateY(0); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Expert Analysis Styles */
.exec-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 24px;
  border-left: 4px solid var(--accent);
}
.exec-summary h3 { font-size: 16px; margin-bottom: 12px; color: var(--accent2); }
.exec-summary p { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 8px; }

.country-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.country-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.country-card-header h3 { font-size: 16px; font-weight: 600; }
.status-pill {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  text-transform: uppercase;
}
.status-pill.growing { background: rgba(34,197,94,0.15); color: var(--green); }
.status-pill.stable { background: rgba(99,102,241,0.15); color: var(--accent2); }
.status-pill.declining { background: rgba(239,68,68,0.15); color: var(--red); }

.country-metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.country-metric { text-align: center; }
.country-metric .cm-value { font-size: 20px; font-weight: 700; }
.country-metric .cm-label { font-size: 11px; color: var(--text2); }

.link-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.link-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--accent2); text-decoration: none; transition: all 0.15s;
}
.link-chip:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }
.link-chip.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.link-chip.pending::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); }
.link-chip.offline::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text2); }

.analyst-note {
  background: var(--surface2); border-radius: 8px; padding: 12px 16px;
  font-size: 13px; line-height: 1.7; color: var(--text); margin-top: 8px;
  border-left: 2px solid var(--accent2);
}
.analyst-note strong { color: var(--accent2); }

.todo-list { list-style: none; }
.todo-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.6;
}
.todo-list li:last-child { border-bottom: none; }
.todo-icon {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 2px;
}
.todo-icon.red { background: rgba(239,68,68,0.15); color: var(--red); }
.todo-icon.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.todo-icon.blue { background: rgba(99,102,241,0.15); color: var(--accent2); }
.todo-icon.green { background: rgba(34,197,94,0.15); color: var(--green); }

.direction-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
  border-left: 4px solid var(--green);
}
.direction-card h4 { font-size: 14px; color: var(--green); margin-bottom: 8px; }
.direction-card p { font-size: 13px; line-height: 1.7; }

.sub-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.sub-tab {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.sub-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.ranking-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
.ranking-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.ranking-table td:first-child { font-weight: 600; color: var(--accent2); width: 30px; }
.ranking-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.ranking-table tr.is-selected-country { background: rgba(124,181,255,0.08); }

/* Main page insight summary */
.main-insight-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 20px;
  border-left: 4px solid var(--accent);
}
.main-insight-hero h2 { font-size: 17px; margin-bottom: 14px; color: var(--accent2); }
.main-insight-kpis {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.main-insight-kpi { text-align: center; }
.main-insight-kpi .mik-value { font-size: 22px; font-weight: 700; }
.main-insight-kpi .mik-label { font-size: 11px; color: var(--text2); }

.main-actions-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
}
.main-actions-wrap h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }
.main-action-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; transition: background 0.15s;
  font-size: 13px; line-height: 1.6;
}
.main-action-row:hover { background: var(--surface2); }
.main-action-row .todo-icon { flex-shrink: 0; }
.main-action-row .action-detail-link {
  margin-left: auto; flex-shrink: 0; font-size: 11px;
  color: var(--accent2); opacity: 0.6; transition: opacity 0.15s;
  white-space: nowrap; padding-left: 8px;
}
.main-action-row:hover .action-detail-link { opacity: 1; }

.view-all-link {
  display: inline-block; margin-top: 8px; font-size: 12px;
  color: var(--accent2); cursor: pointer; text-decoration: none;
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  transition: all 0.15s;
}
.view-all-link:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }

/* Country status mini cards on main page */
.country-status-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px; margin-top: 12px;
}
.country-status-mini {
  padding: 8px 12px; border-radius: 8px;
  background: var(--surface2); cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
  font-size: 12px;
}
.country-status-mini:hover { border-color: var(--accent); }
.country-status-mini .csm-name { font-weight: 600; margin-bottom: 2px; }
.country-status-mini .csm-stat { color: var(--text2); font-size: 11px; }

/* Detail data section */
.detail-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 40px 0 20px; padding-top: 24px;
  border-top: 2px solid var(--border);
}
.detail-divider span {
  font-size: 13px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.detail-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.detail-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
}
.detail-tab {
  padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.detail-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }
.detail-tab:hover:not(.active) { color: var(--text); border-color: var(--text2); }
.detail-content { display: none; }
.detail-content.active { display: block; }

/* Scroll-to-detail link */
.scroll-to-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--accent2); cursor: pointer;
  opacity: 0.7; transition: opacity 0.15s; text-decoration: none;
}
.scroll-to-detail:hover { opacity: 1; text-decoration: underline; }

/* Page Links Drawer */
.links-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.links-overlay.open { opacity: 1; pointer-events: auto; }
.links-drawer {
  position: fixed; top: 0; right: -400px; width: 380px; max-width: 90vw;
  height: 100vh; background: var(--surface); border-left: 1px solid var(--border);
  z-index: 301; display: flex; flex-direction: column;
  transition: right 0.3s ease;
  box-shadow: -4px 0 24px rgba(0,0,0,0.2);
}
.links-drawer.open { right: 0; }
.links-drawer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.links-drawer-header h3 { font-size: 15px; white-space: nowrap; }
.links-search {
  flex: 1; padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 12px; outline: none;
}
.links-search:focus { border-color: var(--accent); }
.links-close {
  background: none; border: none; color: var(--text2);
  font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.links-close:hover { color: var(--text); }
.links-drawer-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
}
.links-country-group { margin-bottom: 16px; }
.links-country-label {
  font-size: 12px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.links-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px;
  text-decoration: none; color: var(--text);
  font-size: 13px; transition: background 0.12s;
}
.links-item:hover { background: var(--surface2); }
.links-item .li-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.links-item .li-dot.live { background: var(--green); }
.links-item .li-dot.pending { background: var(--yellow); }
.links-item .li-dot.offline { background: var(--text2); }
.links-item .li-type {
  font-size: 11px; color: var(--text2); margin-left: auto; white-space: nowrap;
}

/* =========== Intelligence Brief =========== */
.intel-brief {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.intel-brief::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--orange));
}
.intel-brief-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.intel-brief-header h2 { font-size: 17px; font-weight: 700; }
.intel-brief-header .ai-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(34,197,94,0.2));
  color: var(--accent2); font-weight: 600; letter-spacing: 0.5px;
}
.intel-brief-actions { display: flex; gap: 6px; }
.brief-item {
  padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
  background: var(--surface2); border-left: 4px solid;
  transition: all 0.2s;
}
.brief-item:hover { transform: translateX(2px); }
.brief-item.alert { border-left-color: var(--red); }
.brief-item.watch { border-left-color: var(--yellow); }
.brief-item.good { border-left-color: var(--green); }
.brief-item .brief-signal {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 1px 8px; border-radius: 4px; margin-right: 8px;
  vertical-align: middle;
}
.brief-item.alert .brief-signal { background: rgba(239,68,68,0.15); color: var(--red); }
.brief-item.watch .brief-signal { background: rgba(234,179,8,0.15); color: var(--yellow); }
.brief-item.good .brief-signal { background: rgba(34,197,94,0.15); color: var(--green); }
.brief-item .brief-text { font-size: 13px; line-height: 1.7; }
.brief-item .brief-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
}
.brief-item .brief-detail.open { display: block; }
.brief-item .see-data-btn {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px; font-size: 11px; color: var(--accent2);
  cursor: pointer; background: none; border: none;
  transition: opacity 0.15s; opacity: 0.7;
}
.brief-item .see-data-btn:hover { opacity: 1; }
.brief-skeleton {
  animation: pulse 1.5s ease-in-out infinite;
}
.brief-skeleton .skel-line {
  height: 14px; border-radius: 4px; background: var(--surface2); margin-bottom: 10px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.brief-no-key {
  text-align: center; padding: 24px; color: var(--text2); font-size: 13px;
}
.brief-no-key .setup-link {
  color: var(--accent2); cursor: pointer; text-decoration: underline;
}

.local-mode-notice {
  display: none;
  margin: 0 0 18px;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(245, 158, 11, 0.28);
  background: linear-gradient(180deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.05));
}

.local-mode-notice.show {
  display: block;
}

.local-mode-notice strong {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
}

.local-mode-notice p {
  margin: 0;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text2);
}

.local-mode-notice code {
  color: var(--text);
  background: rgba(15, 23, 42, 0.35);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 1px 6px;
  border-radius: 999px;
}

/* =========== Signal Cards =========== */
.signal-cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 22px 22px 18px; cursor: pointer;
  transition: all 0.2s; border-left: 0;
  box-shadow: var(--shadow-card);
}
.signal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(23,32,51,0.08); }
.signal-card.sig-red { border-color: rgba(239,68,68,0.2); }
.signal-card.sig-yellow { border-color: rgba(234,179,8,0.2); }
.signal-card.sig-green { border-color: rgba(34,197,94,0.2); }
.signal-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
.signal-card-top h3 { font-size: 15px; font-weight: 700; display:inline-flex; align-items:flex-start; gap:10px; }
.signal-badge {
  font-size: 10px; padding: 6px 12px; border-radius: 14px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px;
}
.signal-badge.sig-red { background: rgba(239,68,68,0.12); color: var(--red); }
.signal-badge.sig-yellow { background: rgba(234,179,8,0.12); color: var(--yellow); }
.signal-badge.sig-green { background: rgba(34,197,94,0.12); color: var(--green); }
.signal-badge .ui-icon { width: 14px; height: 14px; }
.signal-card-metrics {
  display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px 28px; margin-bottom: 12px;
}
.signal-card-metric { text-align: left; }
.signal-card-metrics .scm-val { font-size: 24px; font-weight: 700; letter-spacing:-0.03em; }
.signal-card-metrics .scm-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; display:inline-flex; align-items:center; gap:6px; margin-bottom: 8px; }
.signal-card-metrics .scm-label .ui-icon { width:14px; height:14px; }
.signal-card-metrics .scm-delta { font-size: 11px; margin-top: 6px; }
.signal-card-note {
  font-size: 12px; color: var(--text2); font-style: normal;
  padding: 10px 12px; background: var(--surface2); border-radius: 12px;
  border: 1px solid var(--border);
}
.signal-card-expanded {
  display: none; margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.signal-card.open .signal-card-note { display: none; }
.signal-card.open .signal-card-expanded { display: block; }
.signal-card-toggle { text-align:center; margin-top:8px; font-size:11px; color:var(--text2); }
.signal-card-toggle .toggle-collapse { display: none; }
.signal-card.open .signal-card-toggle .toggle-expand { display: none; }
.signal-card.open .signal-card-toggle .toggle-collapse { display: inline; }

/* =========== Action To-Do Checkboxes =========== */
.todo-check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
  transition: all 0.15s; border: 1px solid transparent;
}
.todo-check-item:hover { background: var(--surface2); }
.todo-check-item.done { opacity: 0.45; }
.todo-check-item.done .todo-check-text { text-decoration: line-through; }
.todo-check-input {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--accent);
}
.todo-check-text { font-size: 13px; line-height: 1.6; flex: 1; }
.todo-check-priority {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; flex-shrink: 0; margin-top: 3px;
}
.todo-check-priority.p-high { background: rgba(239,68,68,0.2); color: var(--red); }
.todo-check-priority.p-medium { background: rgba(234,179,8,0.2); color: var(--yellow); }
.todo-check-priority.p-low { background: rgba(34,197,94,0.2); color: var(--green); }
.todo-insight-ref {
  font-size: 11px; color: var(--accent2); cursor: pointer;
  background: none; border: none; margin-top: 4px; opacity: 0.7;
}
.todo-insight-ref:hover { opacity: 1; text-decoration: underline; }

/* =========== Today's Focus Widget =========== */

/* =========== Settings Modal =========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 400; display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw;
}
.modal-box h3 { font-size: 16px; margin-bottom: 16px; }
.modal-box label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
.modal-box input[type="password"] {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 13px; margin-bottom: 12px;
}
.modal-box input[type="password"]:focus { border-color: var(--accent); outline: none; }
.modal-box .modal-warn {
  font-size: 11px; color: var(--yellow); margin-bottom: 12px;
  padding: 8px; background: rgba(234,179,8,0.08); border-radius: 6px;
}
.modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* =========== Primary Tabs =========== */
.primary-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}
.primary-tab {
  padding: 8px 20px; border-radius: 8px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s; font-weight: 500;
}
.primary-tab.active { background: var(--accent); color: white; }
.primary-tab:hover:not(.active) { color: var(--text); }
.ptab-content { display: none; }
.ptab-content.active { display: block; }

/* Lovable-inspired visual upgrade layer */
:root, [data-theme="dark"] {
  --bg: #0b1320;
  --surface: #111c2d;
  --surface2: #172538;
  --surface3: #1e2d43;
  --border: rgba(150, 167, 194, 0.18);
  --text: #edf3ff;
  --text2: #96a7c2;
  --accent: #2388ff;
  --accent2: #7cb5ff;
  --green: #21a366;
  --red: #e45757;
  --yellow: #f5b73d;
  --orange: #f38b4a;
  --chart-grid: rgba(150, 167, 194, 0.15);
  --chart-text: #96a7c2;
  --hover-row: rgba(35, 136, 255, 0.06);
  --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.22);
  --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.18);
  --filter-active-bg: rgba(35, 136, 255, 0.16);
  --filter-active-border: rgba(124, 181, 255, 0.5);
  --filter-inactive-bg: rgba(255, 255, 255, 0.02);
  --rank-gold: #f5b73d;
  --rank-silver: #9aa7bd;
  --rank-bronze: #c47b4a;
}

[data-theme="light"] {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --surface3: #e9eef7;
  --border: #d9e2ef;
  --text: #172033;
  --text2: #6b7c96;
  --accent: #3167e3;
  --accent2: #5a86ea;
  --green: #158a54;
  --red: #ef4f4f;
  --yellow: #d39a17;
  --orange: #d86d2a;
  --chart-grid: rgba(23, 32, 51, 0.08);
  --chart-text: #5f718d;
  --hover-row: rgba(25, 103, 210, 0.05);
  --shadow-soft: 0 6px 18px rgba(23, 32, 51, 0.06);
  --shadow-card: 0 2px 10px rgba(23, 32, 51, 0.04);
  --filter-active-bg: #3167e3;
  --filter-active-border: #3167e3;
  --filter-inactive-bg: #ffffff;
  --rank-gold: #bc8410;
  --rank-silver: #6e7b8f;
  --rank-bronze: #ad6533;
}

body {
  font-family: "IBM Plex Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.header {
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(14px);
}

.header h1 {
  font-weight: 700;
  letter-spacing: -0.02em;
}

.toggle-group {
  border-radius: 999px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

.toggle-group button {
  padding: 6px 13px;
  font-weight: 600;
}

.btn {
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 10px 20px rgba(35, 136, 255, 0.22);
}

.btn-primary:hover {
  filter: brightness(1.04);
  transform: translateY(-1px);
}

.btn-outline {
  background: var(--filter-inactive-bg);
  backdrop-filter: blur(8px);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
  transform: translateY(-1px);
}

.btn-outline.active {
  border-color: var(--filter-active-border);
  color: var(--accent2);
  background: var(--filter-active-bg);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

.filters {
  gap: 12px;
}

.filter-level {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px 16px;
  box-shadow: none;
}

.filter-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.filter-label::before {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--accent2);
  font-size: 11px;
  content: none;
}

.filter-row .btn-outline {
  min-height: 38px;
  padding: 8px 14px;
}

.filter-btn-inner {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.filter-btn-inner .ui-icon {
  width: 14px;
  height: 14px;
}

.kpi-card,
.chart-card,
.insight-card,
.status-table-wrap,
.exec-summary,
.country-card,
.main-insight-hero,
.main-actions-wrap,

.kpi-card {

}

.kpi-card:hover,

.kpi-card .kpi-label {

.kpi-card .kpi-value {

}

.section-title {

}

.section-head {

}

.ui-icon {

.chart-title {

.section-tag {

.section-tag .ui-icon {

.chart-title .ui-icon {

.chart-empty-state {

.trend-icon {

.kpi-card-head {

.kpi-card-icon {

.kpi-change {

.kpi-change .change-meta {

.section-title-icon {

.section-kicker {

.status-pill {

.ranking-title {

.ranking-title .ui-icon {

  background: color-mix(in srgb, var(--rank-silver) 18%, transparent);

}

.rank-badge.rank-3 {
  background: color-mix(in srgb, var(--rank-bronze) 18%, transparent);
  color: var(--rank-bronze);
}

.primary-tabs {
  gap: 6px;
  border-radius: 0;
  padding: 0;
  border: none;
  box-shadow: none;
  background: transparent;
}

.primary-tab {
  height: 44px;
  padding: 0 18px;
  border-radius: 16px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
  line-height: 1;
}

.primary-tab::before {
  content: none;
}

.tab-icon-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 8px;
  background: transparent;
  color: currentColor;
}

.detail-tab {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.detail-tab .ui-icon {
  width: 15px;
  height: 15px;
}

.country-card-header h3,
.country-section-title,
.product-section-title,
.notes-section-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.country-label-inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.metric-label-inline {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.metric-label-inline .ui-icon {
  width: 14px;
  height: 14px;
}

.link-chip {
  border-radius: 999px;
  padding: 5px 10px;
}

.link-chip .ui-icon {
  width: 12px;
  height: 12px;
}

.link-chip.live,
.link-chip.pending,
.link-chip.offline {
  gap: 6px;
}

.link-chip.live::before,
.link-chip.pending::before,
.link-chip.offline::before {
  content: none;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.status-pill .ui-icon {
  width: 12px;
  height: 12px;
}

.primary-tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 10px rgba(49, 103, 227, 0.22);
}

.primary-tab:hover:not(.active) {
  background: rgba(90, 134, 234, 0.08);
  color: var(--text);
}

.intel-brief,
.main-insight-hero {
  position: relative;
  overflow: hidden;
}

.intel-brief::after,
.main-insight-hero::after {
  content: '';
  position: absolute;
  inset: auto -40px -40px auto;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124, 181, 255, 0.12), transparent 68%);
  pointer-events: none;
}

.brief-item {
  border-radius: 14px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

.brief-item.alert {
  background: linear-gradient(135deg, rgba(239,68,68,0.10), rgba(239,68,68,0.03));
  box-shadow: inset 0 0 0 1px rgba(239,68,68,0.08);
}

.brief-item.watch {
  background: linear-gradient(135deg, rgba(234,179,8,0.10), rgba(234,179,8,0.03));
  box-shadow: inset 0 0 0 1px rgba(234,179,8,0.08);
}

.brief-item.good {
  background: linear-gradient(135deg, rgba(34,197,94,0.10), rgba(34,197,94,0.03));
  box-shadow: inset 0 0 0 1px rgba(34,197,94,0.08);
}

.brief-item-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.brief-signal.brief-signal-icon {
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 0;
  margin-right: 0;
}

.brief-signal-icon .ui-icon {
  width: 12px;
  height: 12px;
}

.brief-meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text2);
}

.hero-head {
  margin-bottom: 16px;
}

.main-insight-kpi {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 12px;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
}

.main-insight-kpi:hover {
  transform: translateY(-2px);
  border-color: var(--filter-active-border);
  background: rgba(124, 181, 255, 0.06);
}

.main-insight-kpi .mik-label {
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}

.main-insight-kpi .mik-sub {
  margin-top: 8px;
  min-height: 18px;
  font-size: 11px;
}

.main-insight-kpi .mik-sub .kpi-change {
  font-size: 11px;
}

.inline-link-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--accent2);
  background: rgba(124, 181, 255, 0.08);
}

.inline-link-icon:hover {
  border-color: var(--accent);
  background: rgba(124, 181, 255, 0.16);
}

.inline-link-action {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--accent2);
  background: rgba(124, 181, 255, 0.08);
  font-size: 11px;
  font-weight: 700;
}

.inline-link-action:hover {
  border-color: var(--accent);
  background: rgba(124, 181, 255, 0.16);
}

.country-status-mini {
  border-radius: 14px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
}

.country-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-width: 22px;
}

.country-badge-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.country-flag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.country-flag-svg {
  display: block;
  width: 18px;
  height: 14px;
  border-radius: 3px;
  box-shadow: 0 0 0 1px rgba(23,32,51,0.08);
}

.country-badge-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 16px;
  padding: 0 4px;
  border-radius: 999px;
  background: rgba(124,181,255,0.12);
  color: var(--accent2);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.status-pill.growing {
  background: linear-gradient(135deg, rgba(34,197,94,0.22), rgba(34,197,94,0.08));
  box-shadow: inset 0 0 0 1px rgba(34,197,94,0.12);
}

.status-pill.stable {
  background: linear-gradient(135deg, rgba(234,179,8,0.20), rgba(234,179,8,0.08));
  color: var(--yellow);
  box-shadow: inset 0 0 0 1px rgba(234,179,8,0.12);
}

.status-pill.declining {
  background: linear-gradient(135deg, rgba(239,68,68,0.22), rgba(239,68,68,0.08));
  box-shadow: inset 0 0 0 1px rgba(239,68,68,0.12);
}

.country-status-mini .csm-name::before {
  content: none;
}

.exec-summary > h3 {
  display: flex;
  align-items: center;
  gap: 8px;
}

.exec-summary > h3::before {
  content: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--accent2);
  font-size: 11px;
}

.detail-tab {
  border-radius: 999px;
  background: var(--surface);
  font-weight: 600;
  border: 1px solid var(--border);
}

.detail-tab.active {
  border-color: var(--filter-active-border);
  background: var(--filter-active-bg);
}

/* V03 Key Insights */
.v03-section {
  background: linear-gradient(160deg, rgba(99,102,241,0.045) 0%, transparent 60%), var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
}
.v03-section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}
.v03-kicker {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .08em;
  color: var(--text2);
  text-transform: uppercase;
}
.v03-title {
  margin-top: 4px;
  font-size: 18px;
  font-weight: 800;
  color: var(--accent2);
}
.v03-subtitle {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text2);
}
.v03-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.v03-sat-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 2px;
}
.v03-metric-group,
.v03-panel,
.v03-action-card,
.v03-signal-board,
.v03-sat-card,
.v03-list-panel,
.v03-comment-line {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.v03-metric-group { padding: 14px; }
.v03-sat-card { padding: 12px 14px; text-align: center; }
.v03-list-panel,
.v03-comment-line { padding: 14px; }
/* KPI 그룹 상단 컬러 강조선 */
.v03-metric-group {
  position: relative;
  overflow: hidden;
}
.v03-metric-group::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), rgba(99,102,241,0.1));
  border-radius: 12px 12px 0 0;
}
.v03-group-title,
.v03-board-title,
.v03-sat-section-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.v03-group-title { margin-bottom: 10px; }
.v03-metric-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px 10px;
  align-items: baseline;
  padding: 7px 0;
  border-top: 1px solid rgba(255,255,255,.05);
}
.v03-metric-row:first-of-type { border-top: none; }
.v03-metric-label,
.v03-sat-label,
.v03-action-label {
  color: var(--text2);
  font-size: 11px;
  font-weight: 800;
}
.v03-metric-label { text-transform: uppercase; }
.v03-metric-value,
.v03-sat-value {
  color: var(--text);
  font-size: 20px;
  font-weight: 800;
  line-height: 1.2;
  margin: 4px 0 2px;
}
.v03-delta {
  grid-column: 1 / -1;
  font-size: 11px;
  font-weight: 800;
}
.v03-delta.up { color: var(--green); }
.v03-delta.down { color: var(--red); }
.v03-delta.neutral { color: var(--text2); }
.v03-signal-board {
  padding: 16px;
  margin-top: 14px;
}
.v03-board-title { margin-bottom: 12px; }
.v03-signal-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0 28px;
  align-items: start;
}
.v03-panels-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.v03-country-chip,
.v03-action-extra-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.025);
  border-radius: 10px;
  padding: 10px 12px;
}
.v03-signal-row {
  display: grid;
  grid-template-columns: 22px 120px 96px 1fr;
  align-items: center;
  gap: 8px;
  padding: 9px 4px;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
/* 각 열의 마지막 행 구분선 제거 — nth-of-type으로 좌/우 모두 처리 */
.v03-signal-row:nth-last-child(-n+2) { border-bottom: none; }
.v03-signal-collapsed { cursor: pointer; border: 1px dashed rgba(99,102,241,.3); border-radius: 6px; background: rgba(99,102,241,.04); }
.v03-signal-collapsed:hover { background: rgba(99,102,241,.08); }
.v03-signal-top { display: contents; }

/* ── Signal count pills ── */
.v03-signal-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.v03-signal-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid;
  white-space: nowrap;
}
.v03-signal-pill.risk  { color: var(--red);    background: rgba(239,68,68,.1);  border-color: rgba(239,68,68,.25); }
.v03-signal-pill.watch { color: var(--yellow); background: rgba(234,179,8,.1); border-color: rgba(234,179,8,.25); }
.v03-signal-pill.good  { color: var(--green);  background: rgba(34,197,94,.1);  border-color: rgba(34,197,94,.25); }
.v03-signal-pill strong { font-size: 12px; }

/* ── Cluster card grid ── */
.v03-cluster-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.v03-cluster-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 14px;
  border-left: 3px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.v03-cluster-card.risk  { border-left-color: var(--red); }
.v03-cluster-card.watch { border-left-color: var(--yellow); }
.v03-cluster-card.good  { border-left-color: var(--green); }
.v03-cluster-card.empty { opacity: .5; }
.v03-cluster-empty-msg {
  font-size: 11px;
  color: var(--text2);
  font-style: italic;
  padding: 6px 0;
}
/* ── 신호 카드 새 필드 ── */
.v03-cluster-symptom {
  font-size: 12px;
  color: var(--text);
  font-weight: 600;
  line-height: 1.35;
}
.v03-cluster-diag {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.4;
}
.v03-cluster-anchor-btn {
  margin-top: auto;
  align-self: flex-start;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid rgba(99,102,241,.35);
  background: rgba(99,102,241,.1);
  color: var(--accent2);
  transition: background .15s;
}
.v03-cluster-anchor-btn:hover { background: rgba(99,102,241,.2); }

/* ── Insight & Action 신호 블록 ── */
.v03-signal-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  scroll-margin-top: 80px;
}
.v03-signal-block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.v03-signal-block-header:hover { background: rgba(255,255,255,.02); }
.v03-signal-block-title {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.v03-signal-block-meta {
  font-size: 11px;
  color: var(--text2);
  margin-left: auto;
  flex-shrink: 0;
}
.v03-priority-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
  flex-shrink: 0;
}
.v03-priority-badge.high  { color: var(--red);    background: rgba(239,68,68,.12); }
.v03-priority-badge.watch { color: var(--yellow); background: rgba(234,179,8,.12); }
.v03-priority-badge.ref   { color: var(--green);  background: rgba(34,197,94,.12); }
.v03-priority-badge.good  { color: var(--green);  background: rgba(34,197,94,.12); }
.v03-signal-block.green {
  border-color: rgba(34,197,94,.22);
  background: linear-gradient(160deg, rgba(34,197,94,.04) 0%, var(--surface2) 55%);
}
.v03-signal-block.green .v03-signal-block-header {
  border-bottom-color: rgba(34,197,94,.10);
}
.v03-signal-block-body {
  padding: 16px;
}
.v03-signal-field {
  margin-bottom: 14px;
}
.v03-signal-field-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
}
.v03-signal-field-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}
/* ── 영향 대상 테이블 ── */
.v03-affected-table-wrap {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
}
.v03-affected-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.v03-affected-table th {
  background: rgba(255,255,255,.04);
  color: var(--text2);
  font-weight: 700;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: .04em;
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.v03-affected-table td {
  padding: 7px 10px;
  color: var(--text);
  border-bottom: 1px solid rgba(255,255,255,.04);
  white-space: nowrap;
}
.v03-affected-table tr:last-child td { border-bottom: none; }
.v03-affected-table tr:hover td { background: rgba(255,255,255,.02); }
.v03-cell-down { color: var(--red);    font-weight: 700; }
.v03-cell-up   { color: var(--green);  font-weight: 700; }
.v03-cell-warn { color: var(--yellow); font-weight: 600; }
.v03-secondary-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  background: rgba(99,102,241,.12);
  color: var(--accent2);
  margin: 1px 2px;
}
.v03-combo-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.v03-combo-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.12);
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
}
.v03-combo-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.v03-combo-chip.active {
  background: rgba(99,102,241,.15);
  border-color: var(--accent);
  color: var(--accent);
}
.v03-combo-chip .v03-chip-count {
  font-weight: 800;
}
.v03-affected-table tr.v03-row-hl td {
  background: rgba(234,179,8,.07);
}
.v03-affected-table tr.v03-row-dim td {
  opacity: 0.32;
}
.v03-expand-row-btn {
  background: none;
  border: 1px dashed rgba(255,255,255,.15);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  width: 100%;
  padding: 6px;
  cursor: pointer;
  border-radius: 0 0 7px 7px;
}
.v03-expand-row-btn:hover { background: rgba(255,255,255,.03); }
.v03-hidden-row { display: none; }
/* ── HSAD 대응 과제 ── */
.v03-tasks-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.v03-task-card {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.v03-task-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.v03-task-left { display: flex; align-items: center; gap: 6px; min-width: 0; }
.v03-task-num { font-size: 11px; font-weight: 800; color: var(--text2); flex-shrink: 0; }
.v03-task-name { font-size: 12px; font-weight: 700; color: var(--text); }
.v03-task-targets { font-size: 11px; color: var(--text2); }
.v03-task-action-list { display: flex; flex-direction: column; gap: 3px; }
.v03-task-action-item { font-size: 11px; color: var(--text); line-height: 1.5; }
.v03-task-notes-wrap { display: flex; flex-direction: column; gap: 4px; }
.v03-task-notes-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.v03-task-notes-input {
  background: rgba(0,0,0,.2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 5px;
  color: var(--text);
  font-size: 11px;
  line-height: 1.5;

.v03-aff-static-sub { font-size: 11px; color: var(--text2); line-height: 1.5; }

.v03-sample-badge { display:inline-block; background:rgba(251,191,36,.15); color:#fbbf24; font-size:9px; font-weight:800; border-radius:4px; padding:1px 5px; letter-spacing:.04em; vertical-align:middle; white-space:nowrap; }

.v03-dq-notice { font-size:10px; color:rgba(251,191,36,.7); margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }

.v03-signal-block-sample { opacity:.85; }

/* ── 신호 감지 조건 ── */

.v03-criteria-body { padding:0 16px 16px; display:none; }

  width: 100%;
  font-size: 11px;

  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 6px;

}

.v03-block-footer {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-top: 1px solid rgba(255,255,255,.06);

}

  margin-bottom: 14px;
}

  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px dashed rgba(255,255,255,.15);
  border-radius: 8px;

  color: var(--text2);

}

@media (max-width: 900px) {
  .v03-owner-action-grid { grid-template-columns: 1fr; }
}

  display: flex;
  align-items: center;
  gap: 8px;
}

  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
}

  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
}

  gap: 6px;
  font-size: 11px;
  color: var(--text);

}

  font-size: 10px;
  font-weight: 800;
  color: var(--text2);

  display: flex;

  gap: 3px;
}

  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;

  .v03-cluster-grid { grid-template-columns: 1fr; }
}
.v03-signal-target {

  font-weight: 700;

/* 신호 행 안에서는 컬럼 너비 꽉 채워 정렬감 확보 */

.v03-action-body,

/* ============================================================
   SATISFACTION TAB
   ============================================================ */
.sat-section { margin-bottom: 24px; }
.sat-section-title {
  font-size: 13px; font-weight: 800; color: var(--accent2);
  display: flex; align-items: center; gap: 6px; margin-bottom: 14px;
}
/* Overview KPIs */
.sat-kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0,1fr));
  gap: 10px;
}
.sat-kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
}
.sat-kpi-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.sat-kpi-value { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
.sat-kpi-mom { font-size: 11px; font-weight: 600; }
.sat-kpi-mom.up   { color: var(--green); }
.sat-kpi-mom.down { color: var(--red); }
.sat-kpi-mom.flat { color: var(--text2); }
/* Monthly trend strip */
.sat-trend-strip {
  display: flex; gap: 6px; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; margin-top: 10px;
  flex-wrap: wrap;
}
.sat-trend-item { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 52px; }
.sat-trend-month { font-size: 10px; color: var(--text2); font-weight: 600; }
.sat-trend-val { font-size: 13px; font-weight: 800; color: var(--text); }
.sat-trend-item.latest .sat-trend-val { color: var(--accent2); }
.sat-trend-sep { color: var(--border); font-size: 16px; flex-shrink: 0; }
/* Country/Category grid */
.sat-country-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 10px;
}
.sat-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
}
.sat-panel-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }
.sat-rank-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 12px;
}
.sat-rank-row:last-child { border-bottom: none; }
.sat-rank-no { font-size: 10px; font-weight: 700; color: var(--text2); width: 16px; flex-shrink: 0; }
.sat-rank-name { flex: 1; font-weight: 600; color: var(--text); }
.sat-rank-val { font-weight: 700; white-space: nowrap; }
.sat-rank-val.good { color: var(--green); }
.sat-rank-val.risk { color: var(--red); }
/* Category matrix */
.sat-cat-matrix {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.sat-cat-matrix th {
  padding: 7px 12px; text-align: center; font-size: 10px; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid var(--border);
}
.sat-cat-matrix th:first-child { text-align: left; }
.sat-cat-matrix td {
  padding: 8px 12px; text-align: center;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.sat-cat-matrix td:first-child { text-align: left; font-weight: 700; color: var(--text); }
.sat-cat-matrix tr:last-child td { border-bottom: none; }
.sat-chip {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
}
.sat-chip.high { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
.sat-chip.watch { background: rgba(234,179,8,.12); color: var(--yellow); border: 1px solid rgba(234,179,8,.2); }
.sat-chip.risk { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
/* Reason analysis */
.sat-reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sat-reason-bar-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 12px;
}
.sat-reason-label { flex: 1; color: var(--text); }
.sat-reason-bar-wrap { flex: 0 0 100px; height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.sat-reason-bar { height: 100%; border-radius: 99px; }
.sat-reason-bar.pos { background: var(--green); }
.sat-reason-bar.neg { background: var(--red); }
.sat-reason-count { font-size: 11px; font-weight: 700; color: var(--text2); width: 28px; text-align: right; }
/* Device signal */
.sat-device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sat-device-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
}
.sat-device-title { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.sat-device-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.sat-device-stat:last-child { border-bottom: none; }
.sat-device-stat span { color: var(--text2); }
.sat-device-stat strong { color: var(--text); font-weight: 700; }
/* Comments Explorer */
.sat-filter-bar {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; align-items: center;
}
.sat-filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text2);
  background: var(--surface); cursor: pointer; transition: all .15s;
}
.sat-filter-chip.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,.1); }
.sat-filter-chip:hover:not(.active) { border-color: rgba(255,255,255,.2); color: var(--text); }
.sat-search-wrap { flex: 1; min-width: 180px; position: relative; }
.sat-search {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px 5px 28px; font-size: 12px; color: var(--text);
  outline: none;
}
.sat-search:focus { border-color: var(--accent); }
.sat-search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text2); }
.sat-export-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 700;
  border: 1px solid var(--border); color: var(--text2); background: var(--surface);

}
.sat-export-btn:hover { border-color: var(--accent); color: var(--accent2); }
.sat-download-btn {
  padding: 6px 13px; border-radius: 6px; font-size: 11px; font-weight: 700;
  border: 1px solid rgba(99,102,241,.3); color: var(--accent2); background: rgba(99,102,241,.1);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.sat-download-btn:hover { background: rgba(99,102,241,.18); }
.sat-country-select {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12);
  border-radius: 6px; color: var(--text); font-size: 12px; font-weight: 600;
  padding: 5px 10px; cursor: pointer; outline: none; font-family: inherit;
}
.sat-country-select:focus { border-color: var(--accent); }
.sat-country-select option { background: #1a2035; }
.sat-nav-banner {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  background: rgba(99,102,241,.07); border: 1px solid rgba(99,102,241,.2);
  border-radius: 7px; padding: 8px 12px; font-size: 11px; color: var(--accent2);
  margin-bottom: 10px;
}
.sat-nav-banner button {
  background: none; border: 1px solid rgba(99,102,241,.3); border-radius: 4px;
  color: var(--text2); font-size: 10px; padding: 2px 8px; cursor: pointer; flex-shrink: 0;
}
.sat-nav-banner button:hover { border-color: var(--accent2); color: var(--text); }
.sat-comment-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sat-comment-table th {
  padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.sat-comment-table td {
  padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top;
}
.sat-comment-table tr:last-child td { border-bottom: none; }
.sat-comment-table tr:hover td { background: rgba(255,255,255,.02); }
.sat-helpful-yes { color: var(--green); font-weight: 700; }
.sat-helpful-no  { color: var(--red);   font-weight: 700; }
.sat-comment-text { color: var(--text2); font-style: italic; max-width: 280px; }
.sat-reason-tag {
  display: inline-flex; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; background: rgba(255,255,255,.06); color: var(--text2);
}
.sat-page-info { font-size: 11px; color: var(--text2); margin-top: 10px; text-align: right; }
/* Satisfaction tab filter toggle buttons */
.sat-filter-label { font-size: 11px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.sat-btn-group { display: inline-flex; gap: 4px; flex-wrap: wrap; }
.sat-fbtn {
  padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text2); background: transparent;
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.sat-fbtn:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
.sat-fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
/* Section card wrapper */
.sat-section-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
}
.sat-section-header {
  font-size: 13px; font-weight: 800; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.sat-section-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 6px;
  background: rgba(99,102,241,.15); color: var(--accent2);
  font-size: 11px; font-weight: 800; flex-shrink: 0;
}
/* Big KPI cards */
.sat-kpi-card-big {
  background: rgba(255,255,255,.03); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; display: flex; align-items: flex-start; gap: 10px;
}
.sat-kpi-icon {
  width: 32px; height: 32px; border-radius: 8px; background: rgba(99,102,241,.12);

}
.sat-kpi-icon svg { width: 17px; height: 17px; }
/* Small KPI cards */
.sat-kpi-card-sm {
  background: rgba(255,255,255,.03); border: 1px solid var(--border);

.sat-kpi-icon-sm {

}
.sat-kpi-icon-sm svg { width: 14px; height: 14px; }
.sat-kpi-value-sm { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.1; }

.sat-trend-strip-new {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;

.sat-trend-cell {

  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 8px;
  text-align: center;
}
.sat-trend-cell.latest { background: rgba(99,102,241,.06); }
.sat-trend-cell-role { font-size: 9px; font-weight: 800; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; }
.sat-trend-cell-month { font-size: 11px; font-weight: 600; color: var(--text2); margin-top: 1px; }
.sat-trend-cell-val { font-size: 20px; font-weight: 800; color: var(--text); margin-top: 2px; }
.sat-trend-cell.latest .sat-trend-cell-val { color: var(--accent2); }
.sat-trend-cell-delta { font-size: 10px; font-weight: 700; margin-top: 1px; }
.sat-trend-cell-delta.up { color: var(--green); }
.sat-trend-cell-delta.down { color: var(--red); }
.sat-trend-cell-delta.flat { color: var(--text2); }
.sat-trend-sep { width: 1px; align-self: stretch; background: var(--border); opacity: .6; }

.sat-cp-panel {
  background: rgba(255,255,255,.03); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; padding-left: 10px;
}
.sat-cp-title { font-size: 10px; font-weight: 700; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.sat-cp-hdr { display: grid; grid-template-columns: 16px 1fr 36px 28px 36px; gap: 4px; padding: 0 0 4px; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 9px; color: var(--text2); font-weight: 700; text-transform: uppercase; }
.sat-cp-row { display: grid; grid-template-columns: 16px 1fr 36px 28px 36px; gap: 4px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.03); align-items: center; font-size: 11px; }
.sat-cp-row:last-child { border-bottom: none; }
.sat-cp-no { color: var(--text2); font-size: 10px; font-weight: 700; }
.sat-cp-name { color: var(--text); font-weight: 700; }
.sat-cp-val { font-weight: 700; font-size: 12px; }
.sat-cp-val.good { color: var(--green); }
.sat-cp-val.risk { color: var(--red); }
.sat-cp-sub { color: var(--text2); font-size: 11px; }

.sat-reason-box { border-radius: 8px; padding: 8px; border: 1px solid var(--border); }
.sat-reason-box.pos { background: rgba(34,197,94,.04); }
.sat-reason-box.neg { background: rgba(239,68,68,.04); }

.sat-reason-box-title.neg { background: rgba(239,68,68,.1); color: var(--red); }

.sat-reason-li:last-child { border-bottom: none; }
.sat-reason-li-no { color: var(--text2); font-size: 10px; font-weight: 700; width: 12px; flex-shrink: 0; }

.sat-reason-li-pct.pos { color: var(--green); }
.sat-reason-li-pct.neg { color: var(--red); }

  background: rgba(255,255,255,.03); border: 1px solid var(--border);

}
.sat-device-card-new.risk { border-color: rgba(239,68,68,.25); }

.sat-device-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 3px 0; }

let currentLang = localStorage.getItem('lg_dash_lang') || 'ko';
let currentTheme = localStorage.getItem('lg_dash_theme') || 'dark';

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key]) || key; }

function isLocalFileMode() {
  return window.location.protocol === 'file:';
}

function renderLocalModeNotice() {
  const el = document.getElementById('localModeNotice');
  if (!el) return;
  if (!isLocalFileMode()) {
    el.classList.remove('show');
    el.innerHTML = '';
    return;
  }
  el.classList.add('show');
  el.innerHTML = currentLang === 'ko'
    ? `<strong>현재 파일 모드로 열려 있습니다.</strong><p>이 상태에서는 <code>Refresh Data</code>와 데이터 로딩이 제한될 수 있습니다. <code>Start Dashboard.command</code> 를 더블클릭해서 서버 모드로 실행해 주세요.</p>`
    : `<strong>The dashboard is currently opened in file mode.</strong><p>In this mode, <code>Refresh Data</code> and data loading may be limited. Please double-click <code>Start Dashboard.command</code> to run it in local server mode.</p>`;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.title = t('title');
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lg_dash_lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  applyI18n();
  renderLocalModeNotice();
  if (DATA) render();
  // Update toggle active state
  document.querySelectorAll('#langToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === lang);
  });
}

function setTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('lg_dash_theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  // Re-render charts for new colors
  if (DATA) render();
  document.querySelectorAll('#themeToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === theme);
  });
}

function metricIconName(label) {
  const key = String(label || '').toLowerCase();
  if (key.includes('session')) return 'sessions';
  if (key.includes('duration') || key.includes('체류')) return 'duration';
  if (key.includes('conversion') || key.includes('전환')) return 'conversion';
  if (key.includes('click')) return 'behavior';
  if (key.includes('organic') || key.includes('external') || key.includes('internal')) return 'traffic';
  if (key.includes('page')) return 'overview';
  return 'overview';
}

function trendMarkup(change) {
  if (change == null) return '';
  const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';
  const icon = change > 0 ? iconSvg('good', 'trend-icon') : change < 0 ? iconSvg('alert', 'trend-icon') : iconSvg('watch', 'trend-icon');
  const text = `${change > 0 ? '+' : ''}${change.toFixed(1)}%`;
  return `<div class="kpi-change ${cls}"><span class="change-value">${icon}${text}</span><span class="change-meta">MoM</span></div>`;
}

function kpiStatusConfig(change) {
  if (change == null) return {
    cls: 'neutral',
    label: currentLang === 'ko' ? '안정' : 'Stable',
    note: currentLang === 'ko' ? '추이 확인 필요' : 'Trend under review'
  };
  if (change <= -5) return {
    cls: 'down',
    label: currentLang === 'ko' ? '주의' : 'Watch',
    note: currentLang === 'ko' ? '전월 대비 하락 추세' : 'Downward month-over-month trend'
  };
  if (change >= 5) return {
    cls: 'up',
    label: currentLang === 'ko' ? '양호' : 'Strong',
    note: currentLang === 'ko' ? '전월 대비 개선 추세' : 'Positive month-over-month momentum'
  };
  return {
    cls: 'neutral',
    label: currentLang === 'ko' ? '안정' : 'Stable',
    note: currentLang === 'ko' ? '큰 변동 없는 상태' : 'Relatively stable performance'
  };
}

function averageNumbers(values) {
  const valid = (values || []).filter(v => v != null && !Number.isNaN(v));
  return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : null;
}

function percentChange(current, previous) {
  if (current == null || previous == null || previous === 0) return null;
  return ((current - previous) / Math.abs(previous)) * 100;
}
