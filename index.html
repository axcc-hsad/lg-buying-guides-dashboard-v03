function renderActionTodosNew() {
  const el = document.getElementById('actionTodosPanel');
  if (!el) return;

  // Fall back to old GA-based rendering if JSON not loaded
  if (!DASHBOARD_DATA || !DASHBOARD_DATA.actionSummary) {
    // keep old rendering: use clusterData
    const clusterData = v03GetClusterData() || { signalSlots: [] };
    const slots = clusterData.signalSlots || [];
    const IMPROVE_TYPES = new Set(['Traffic Drop', 'SEO Weak', 'Conversion Gap', 'Satisfaction Risk']);
    const PERF_TYPES    = new Set(['Growth Signal', 'Performance Highlight']);
    const PRIORITY_LABEL = { high: '우선순위 높음', watch: '검토 필요' };
    let totalDoing = 0, totalDone = 0;
    slots.forEach(s => {
      if (!IMPROVE_TYPES.has(s.type)) return;
      v03GetDdTasks(s.type, s.tasks).forEach((task, i) => {
        const st = (task && task.status) ? task.status : v03GetTaskStatus(s.slug, i);
        if (st === '진행 중') totalDoing++;
        if (st === '완료')    totalDone++;
      });
    });
    el.innerHTML = `<div class="v03-section"><div class="v03-section-head"><div>
      <div class="v03-title">3. Insight &amp; Action Summary</div>
      <div class="v03-subtitle">데이터 로딩 중… — 진행 중 ${totalDoing}건 · 완료 ${totalDone}건</div>
    </div></div></div>`;
    return;
  }

  const trackedTasks = DASHBOARD_DATA.actionSummary.trackedTasks || [];
  const sampleTasks  = DASHBOARD_DATA.actionSummary.sampleDisplayTasks || [];
  const period = DASHBOARD_DATA.meta.reportingMonth || '';

  const totalDoing = trackedTasks.filter(t => t.status === '진행 중').length;
  const totalDone  = trackedTasks.filter(t => t.status === '완료').length;

  const SIGNAL_TONE_MAP = { 'Traffic Drop':'risk','SEO Weak':'watch','Conversion Gap':'watch','Satisfaction Risk':'risk','Growth Signal':'good','Performance Highlight':'good' };

  const buildRequestHtml = (req) => {
    if (!req) return '';
    return `<div class="v03-aff-section-static" style="margin-top:8px;">
      <div class="v03-aff-static-header">협조 요청</div>
      <div class="v03-aff-static-row"><span style="opacity:.6;margin-right:4px;">대상</span>${v03Esc(req.target)}</div>

      ${req.detail ? `<div class="v03-aff-static-sub">${v03Esc(req.detail)}</div>` : ''}
      ${req.status ? `<div class="v03-aff-static-row" style="margin-top:4px;"><span style="opacity:.6;margin-right:4px;">요청 상태</span><span class="v03-task-status-badge pending" style="font-size:9px;">${v03Esc(req.status)}</span></div>` : ''}

async function loadDashboardData() {
  try {
    const r = await fetch('data/dashboard_data.json');
    DASHBOARD_DATA = await r.json();
    // Synthesize SAT_DATA from satisfactionSummary
    if (DASHBOARD_DATA.satisfactionSummary && DASHBOARD_DATA.satisfactionSummary.responses) {
      const period = DASHBOARD_DATA.meta.reportingMonth;
      const rawRecs = DASHBOARD_DATA.satisfactionSummary.responses;
      // Build normalized response rows
      const responses = rawRecs.map(rec => ({
        period,
        country: rec.country,
        category: rec.category,
        content_type: rec.contentType,
        helpful: rec.helpful,
        reasons: rec.reasons || [],
        reason: Array.isArray(rec.reasons) ? rec.reasons[0] || '' : '',
        comment: rec.comment || '',
        device: rec.device || '',
        isSample: true
      }));
      // Compute monthly aggregation
      const pos  = responses.filter(rec => rec.helpful === 'Yes');
      const neg  = responses.filter(rec => rec.helpful === 'No');
      const total = responses.length;
      const satPct = total ? +(pos.length / total * 100).toFixed(1) : 0;
      const negRate = total ? +(neg.length / total * 100).toFixed(1) : 0;
      const mobilePct = total ? +(responses.filter(rec => /Mobile/i.test(rec.device)).length / total * 100).toFixed(1) : 0;
      // by_country
      const byCountry = {};
      responses.forEach(rec => {
        if (!byCountry[rec.country]) byCountry[rec.country] = { pos:0, total:0 };
        byCountry[rec.country].total++;
        if (rec.helpful === 'Yes') byCountry[rec.country].pos++;
      });
      const by_country = {};
      Object.entries(byCountry).forEach(([c, d]) => {
        by_country[c] = { satisfaction_pct: +(d.pos/d.total*100).toFixed(1), total: d.total };
      });
      // by_category
      const byCat = {};
      responses.forEach(rec => {
        const cat = canonicalCategory(rec.category);
        if (!byCat[cat]) byCat[cat] = { pos:0, total:0 };
        byCat[cat].total++;
        if (rec.helpful === 'Yes') byCat[cat].pos++;
      });
      const by_category = {};
      Object.entries(byCat).forEach(([c, d]) => {
        by_category[c] = { satisfaction_pct: +(d.pos/d.total*100).toFixed(1), total: d.total };
      });
      // by_content_type
      const byCt = {};
      responses.forEach(rec => {
        if (!byCt[rec.content_type]) byCt[rec.content_type] = { pos:0, total:0 };
        byCt[rec.content_type].total++;
        if (rec.helpful === 'Yes') byCt[rec.content_type].pos++;
      });
      const by_content_type = {};
      Object.entries(byCt).forEach(([ct, d]) => {
        by_content_type[ct] = { satisfaction_pct: +(d.pos/d.total*100).toFixed(1), total: d.total };
      });
      // reasons by content_type
      const reasonsByCt = { lineup: { positive:{}, negative:{} }, feature: { positive:{}, negative:{} } };
      responses.forEach(rec => {
        const ct = rec.content_type === 'lineup' ? 'lineup' : 'feature';
        const polarity = rec.helpful === 'Yes' ? 'positive' : 'negative';
        (rec.reasons || []).forEach(rsn => {
          reasonsByCt[ct][polarity][rsn] = (reasonsByCt[ct][polarity][rsn] || 0) + 1;
        });
      });
      const monthly = {
        satisfaction_pct: satPct,
        total,
        negative_rate: negRate,
        positive_rate: satPct,
        mobile_pct: mobilePct,
        by_country,
        by_category,
        by_content_type,
        reasons: reasonsByCt,
        isSample: true
      };
      const countries = [...new Set(responses.map(rec => rec.country))].sort();
      const categories = sortCategories([...new Set(responses.map(rec => canonicalCategory(rec.category)))]);
      SAT_DATA = {
        meta: { latest_period: period, prev_period: null, categories, countries, isSample: true },
        monthly: { [period]: monthly },
        prev_monthly: {},
        responses,
        isSample: true
      };
      if (!satFilters.period) satFilters.period = period;
    }
    renderActionTodosNew();
    renderMainInsights();
  } catch(e) {
    console.warn('dashboard_data.json load failed:', e.message);
  }
}

function v03BuildCommentSignal() {
  if (!SAT_DATA) {
    loadSatisfactionData();
    return `<div style="color:var(--text2);font-size:12px;padding:6px 0;font-style:italic;">만족도 데이터 로딩 중…</div>`;
  }

  const period = SAT_DATA.meta.latest_period;
  const periodResponses = SAT_DATA.responses.filter(r => r.period === period);

  // Satisfaction Risk 그룹 식별 (v03GetClusterData와 동일 기준)
  const groups = {};
  periodResponses.forEach(r => {
    const key = `${r.country}||${r.content_type}`;
    if (!groups[key]) groups[key] = { country: r.country, content_type: r.content_type, items: [] };
    groups[key].items.push(r);
  });
  const riskGroups = Object.values(groups).filter(g => {
    if (g.items.length < 3) return false;
    const neg = g.items.filter(r => r.helpful === 'No').length;
    const satPct = (g.items.length - neg) / g.items.length * 100;
    const negRate = neg / g.items.length * 100;
    return satPct < 75 || negRate > 20;
  }).sort((a, b) => {
    const aSat = a.items.filter(r => r.helpful !== 'No').length / a.items.length;
    const bSat = b.items.filter(r => r.helpful !== 'No').length / b.items.length;
    return aSat - bSat; // 만족도 낮은 순
  });

  // 각 Risk 그룹의 부정 이유 집계 → 1위 추출
  const buildGroupRow = (g) => {
    const negItems = g.items.filter(r => r.helpful === 'No');
    const total = g.items.length;
    const negRate = Math.round(negItems.length / total * 100);
    const satPct = Math.round((total - negItems.length) / total * 100);
    const negCounts = {};
    negItems.forEach(r => (r.neg_reasons||[]).forEach(rn => negCounts[rn] = (negCounts[rn]||0)+1));
    const topReasons = Object.entries(negCounts).sort((a,b)=>b[1]-a[1]).slice(0,2);
    const ctLabel = g.content_type === 'lineup' ? 'Line-up' : 'Feature';
    const ctColor = g.content_type === 'lineup' ? 'var(--accent2)' : 'var(--yellow)';
    const reasonTags = topReasons.map(([r]) =>
      `<span style="background:rgba(239,68,68,.1);color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;white-space:nowrap;">${r}</span>`
    ).join(' ');
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);">
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;min-width:110px;">
        <strong style="font-size:12px;color:var(--text);">${g.country}</strong>
        <span style="font-size:10px;font-weight:700;color:${ctColor};background:rgba(255,255,255,.05);border-radius:3px;padding:1px 5px;">${ctLabel}</span>
      </div>
      <div style="flex-shrink:0;font-size:11px;color:var(--red);font-weight:700;min-width:60px;">만족도 ${satPct}%</div>
      <div style="flex:1;display:flex;gap:4px;flex-wrap:wrap;">${reasonTags || '<span style="font-size:11px;color:var(--text2);">–</span>'}</div>
    </div>`;
  };

  const criteriaNote = riskGroups.length > 0
    ? `Satisfaction Risk ${riskGroups.length}건 · 만족도 낮은 순 · 부정 이유 객관식 집계`
    : `위험 국가 없음 — 전체 기간 만족도 기준 충족`;

  const rows = riskGroups.length > 0
    ? riskGroups.slice(0, 6).map(buildGroupRow).join('')
    : `<div style="font-size:11px;color:var(--text2);padding:6px 0;font-style:italic;">감지된 위험 국가가 없습니다.</div>`;

  return `
    <div style="font-size:10px;color:var(--text2);margin-bottom:8px;opacity:.7;">${criteriaNote}</div>
    <div style="margin-bottom:4px;">
      <div style="display:flex;gap:6px;font-size:10px;color:var(--text2);padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:2px;">
        <span style="min-width:110px;">국가 · 콘텐츠</span>
        <span style="min-width:60px;">만족도</span>
        <span>부정 응답 상위 이유</span>
      </div>
      ${rows}
    </div>
    <div style="margin-top:8px;display:flex;justify-content:flex-end;">
      <button class="v03-mini-btn" onclick="switchToSatisfaction({commentChip:'negative'})">Customer Comments →</button>
    </div>`;
}

function satGetMonthly() {
  if (!SAT_DATA) return null;
  const p = satFilters.period || SAT_DATA.meta.latest_period;
  return SAT_DATA.monthly[p] || null;
}

function satGetPrev() {
  if (!SAT_DATA || !SAT_DATA.prev_monthly) return null;
  return Object.values(SAT_DATA.prev_monthly)[0] || null;
}

function satMoMClass(diff) {
  if (diff == null) return 'flat';
  return diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
}

function satMoMText(diff, unit) {
  if (diff == null) return '–';
  const prefix = diff > 0 ? '+' : '';
  return `${prefix}${diff.toFixed(1)}${unit}`;
}

function satTopReasons(reasonObj, n) {
  if (!reasonObj) return [];
  return Object.entries(reasonObj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

// 설문 항목 정의 (콘텐츠 유형별 분리)
const SAT_REASONS = {
  lineup: {
    positive: ['Clear lineup overview','Simple spec comparison','Easy-to-understand terms (tooltip)','Tailored recommendations'],
    negative: ['Hard to find a product','Unclear model differences','Complex terminology','Missing information'],

    negative: ['Complex explanations','Unclear images or videos','Missing information'],
  },
};

function satGetContentFilter() {
  if (typeof selectedContentType === 'undefined') return 'all';
  if (selectedContentType === 'lineup') return 'lineup';
  if (selectedContentType === 'feature_library') return 'feature';
  return 'all';
}

function satFilteredResponses() {
  if (!SAT_DATA) return [];
  const p = satFilters.period || SAT_DATA.meta.latest_period;
  const contentFilter = satGetContentFilter();
  return SAT_DATA.responses.filter(r => {
    if (r.period !== p) return false;
    if (contentFilter !== 'all' && r.content_type !== contentFilter) return false;
    if (satFilters.country !== 'all' && r.country !== satFilters.country) return false;
    if (satFilters.category !== 'all' && canonicalCategory(r.category) !== satFilters.category) return false;
    return true;
  });
}

        <button class="sat-download-btn" onclick="satExportCSV()" title="현재 조회 조건과 관계없이 전체 객관식 및 주관식 응답 데이터를 다운로드합니다.">⬇ 전체 설문 응답 다운로드</button>
      </div>

        <div style="display:flex;align-items:center;gap:8px;">

          <select class="sat-country-select" onchange="satSetFilter('country',this.value)">

            ${countryOpts}
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span class="sat-filter-label">카테고리</span>
          <div class="sat-btn-group">${catBtns}</div>
        </div>
      </div>

  `;
}

// ── Overview KPI ─────────────────────────────────────────
function satRenderOverview(monthly, prev) {
  if (!monthly) return `<div class="sat-section-card"><div style="color:var(--text2);padding:20px;font-size:13px;">데이터 없음</div></div>`;

  const satDiff    = prev ? +(monthly.satisfaction_pct - prev.satisfaction_pct).toFixed(1) : null;
  const totalDiff  = prev ? Math.round(((monthly.total - prev.total)/prev.total)*100) : null;
  const negDiff    = prev ? +(monthly.negative_rate - prev.negative_rate).toFixed(1) : null;
  const mobileDiff  = prev ? +(monthly.mobile_pct - prev.mobile_pct).toFixed(1) : null;

  const momArrow = (diff, invertGood) => {
    if (diff == null) return '';
    const isGood = invertGood ? diff < 0 : diff > 0;
    const isFlat = diff === 0;
    const cls = isFlat ? 'flat' : isGood ? 'up' : 'down';
    const arrow = isFlat ? '→' : (diff > 0 ? '▲' : '▼');
    const unit = '%p';
    return `<span class="sat-kpi-mom ${cls}">${arrow} ${diff>0?'+':''}${diff}${unit} MoM</span>`;
  };
  const momArrowCount = (diff) => {
    if (diff == null) return '';
    const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '→';
    return `<span class="sat-kpi-mom ${cls}">${arrow} ${diff>0?'+':''}${diff}% MoM</span>`;
  };

  const bigKpi = (icon, label, val, mom) => `
    <div class="sat-kpi-card-big">
      <div class="sat-kpi-icon">${icon}</div>
      <div>
        <div class="sat-kpi-label">${label}</div>
        <div class="sat-kpi-value">${val}</div>
        ${mom}
      </div>
    </div>`;

  const smallKpi = (icon, label, val, mom) => `
    <div class="sat-kpi-card-sm">
      <div class="sat-kpi-icon-sm">${icon}</div>
      <div>
        <div class="sat-kpi-label">${label}</div>
        <div class="sat-kpi-value-sm">${val}</div>
        ${mom}
      </div>
    </div>`;

  const MON_NUM = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const periodSort = p => { const [y,m] = p.split('-'); return parseInt(y)*100 + (MON_NUM[m] ?? parseInt(m)); };
  const allPeriodKeys = [...new Set([
    ...Object.keys(SAT_DATA.prev_monthly||{}),
    ...Object.keys(SAT_DATA.monthly||{})
  ])].sort((a,b) => periodSort(a) - periodSort(b));
  const latestDataPeriod = allPeriodKeys[allPeriodKeys.length - 1] || null;
  const last3raw = allPeriodKeys.slice(-3);
  while (last3raw.length < 3) last3raw.unshift(null);
  const pctOf = p => p ? (SAT_DATA.monthly[p]?.satisfaction_pct ?? SAT_DATA.prev_monthly[p]?.satisfaction_pct ?? null) : null;
  const trendItems = last3raw.map((p, i) => {
    const v    = pctOf(p);
    const prev = i > 0 ? pctOf(last3raw[i-1]) : null;
    const diff = (v != null && prev != null) ? +(v - prev).toFixed(1) : null;
    const mPart = p ? p.split('-')[1] : null;
    const mNum  = mPart ? (MON_NUM[mPart] ?? parseInt(mPart)) : null;
    const mName = mNum ? `${mNum}월` : '';
    const isCurrent = p === latestDataPeriod;
    const deltaCls = diff == null ? '' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    const deltaText = diff == null ? '' : `${diff>0?'+':''}${diff}%p`;
    return `<div class="sat-trend-cell${isCurrent?' latest':''}">
      ${mName ? `<div class="sat-trend-cell-month">${mName}</div>` : ''}
      <div class="sat-trend-cell-val">${v!=null?v.toFixed(0)+'%':'–'}</div>
      ${deltaText ? `<div class="sat-trend-cell-delta ${deltaCls}">${deltaText}</div>` : ''}
    </div>`;
  });
  const trendHtml = `${trendItems[0]}<div class="sat-trend-sep"></div>${trendItems[1]}<div class="sat-trend-sep"></div>${trendItems[2]}`;

  // SVG icons
  const icoSmiley = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="8"/><path d="M7 11.5s1 1.5 3 1.5 3-1.5 3-1.5" stroke-linecap="round"/><circle cx="7.5" cy="8.5" r=".7" fill="currentColor" stroke="none"/><circle cx="12.5" cy="8.5" r=".7" fill="currentColor" stroke="none"/></svg>`;
  const icoPeople = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="6" r="3"/><path d="M2 17c0-3 2.7-5 6-5s6 2 6 5"/><circle cx="15" cy="7" r="2.2"/><path d="M17 17c0-2-1.5-3.5-3.5-4"/></svg>`;
  const icoThumbDown = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 2h8a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7L4 16V4a2 2 0 0 1 3-2z" stroke-linejoin="round"/></svg>`;
  const icoPhone = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="2" width="10" height="16" rx="2"/><circle cx="10" cy="15.5" r=".8" fill="currentColor" stroke="none"/></svg>`;

  return `
    <div class="sat-section-card" style="display:flex;flex-direction:column;justify-content:space-between;">
      <div class="sat-section-header"><span class="sat-section-num">1</span> Satisfaction Overview${SAT_DATA && SAT_DATA.isSample ? ' <span class="v03-sample-badge">SAMPLE</span>' : ''}</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
        ${bigKpi(icoSmiley,'전체 만족도',monthly.satisfaction_pct.toFixed(0)+'%',momArrow(satDiff,false))}
        ${bigKpi(icoPeople,'응답 수',monthly.total,momArrowCount(totalDiff))}
        ${bigKpi(icoThumbDown,'부정 응답률',monthly.negative_rate.toFixed(0)+'%',momArrow(negDiff,true))}
        ${bigKpi(icoPhone,'Mobile 비중',monthly.mobile_pct.toFixed(0)+'%',momArrow(mobileDiff,false))}
      </div>
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;">전체 만족도 추이</div>
        <div class="sat-trend-strip-new">${trendHtml}</div>
      </div>
    </div>
  `;
}

// ── Country & Category (combined) ─────────────────────────
function satRenderCountryCategorySection(monthly) {
  if (!monthly) return `<div class="sat-section-card"><div style="color:var(--text2);padding:20px;">데이터 없음</div></div>`;

  const countries = Object.entries(monthly.by_country||{}).map(([c,d])=>({c,...d})).filter(d=>d.total>0);
  const byHighSat  = [...countries].sort((a,b)=>b.satisfaction_pct-a.satisfaction_pct);
  const byLowSat   = [...countries].sort((a,b)=>a.satisfaction_pct-b.satisfaction_pct);
  const byHighResp = [...countries].sort((a,b)=>b.total-a.total);
  const byLowResp  = [...countries].sort((a,b)=>a.total-b.total).filter(d=>d.total>0);

  const countryPanel = (title, items, isRisk) => {
    const borderColor = isRisk ? 'rgba(239,68,68,.3)' : 'rgba(34,197,94,.2)';
    const rows = items.slice(0,3).map((d,i) => {
      const partPct = byHighResp[0]?.total > 0 ? Math.round(d.total/byHighResp[0].total*30) : 0;
      return `<div class="sat-cp-row">
        <span class="sat-cp-no">${i+1}</span>
        <span class="sat-cp-name">${d.c}</span>
        <span class="sat-cp-val ${isRisk?'risk':'good'}">${d.satisfaction_pct.toFixed(0)}%</span>
        <span class="sat-cp-sub">${d.total}</span>
        <span class="sat-cp-sub">${partPct}%</span>
      </div>`;
    }).join('');
    return `<div class="sat-cp-panel" style="border-left:3px solid ${borderColor}">
      <div class="sat-cp-title">${title}</div>
      <div class="sat-cp-hdr"><span></span><span></span><span>만족도</span><span>응답</span><span>참여율</span></div>
      ${rows}
    </div>`;
  };

  const respPanel = (title, items, isRisk) => {
    const rows = items.slice(0,3).map((d,i) => {
      const topAll = byHighResp[0]?.total || 1;
      return `<div class="sat-cp-row">
        <span class="sat-cp-no">${i+1}</span>
        <span class="sat-cp-name">${d.c}</span>
        <span class="sat-cp-val ${isRisk?'risk':'good'}">${Math.round(d.total/topAll*100)}%</span>
      </div>`;
    }).join('');
    return `<div class="sat-cp-panel" style="border-left:3px solid ${isRisk?'rgba(239,68,68,.3)':'rgba(99,102,241,.2)'}">
      <div class="sat-cp-title">${title}</div>
      ${rows}
    </div>`;
  };

  // Category matrix
  const cats = sortCategories(Object.keys(monthly.by_category||{}).filter(k=>(monthly.by_category[k]?.total||0)>0)).map(k=>[k,monthly.by_category[k]]);
  const chipStatus = (pct) => pct>=80?'high':pct>=60?'watch':'risk';
  const chipLabel  = (pct) => pct>=80?'High':pct>=60?'Watch':'Risk';

  const matrixRows = cats.map(([cat,d]) => {
    const lu = monthly.by_content_type?.lineup;
    const ft = monthly.by_content_type?.feature;
    return `<tr>
      <td style="font-weight:700;color:var(--text)">${cat}</td>
      <td><span class="sat-chip ${chipStatus(d.satisfaction_pct)}">${chipLabel(d.satisfaction_pct)}</span></td>
      <td><span class="sat-chip ${chipStatus(d.satisfaction_pct)}">${chipLabel(d.satisfaction_pct)}</span></td>
      <td style="color:var(--text2)">${d.total}</td>
    </tr>`;
  }).join('');

  return `
    <div class="sat-section-card">
      <div class="sat-section-header"><span class="sat-section-num">2</span> Country &amp; Category View</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:11px;color:var(--text2);font-weight:700;display:flex;align-items:center;gap:5px;">
            <svg style="width:12px;height:12px;stroke:var(--text2);fill:none;stroke-width:2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
            국가별 만족도 / 참여율
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            ${countryPanel('만족도 높은 국가', byHighSat, false)}
            ${countryPanel('만족도 낮은 국가', byLowSat, true)}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            ${respPanel('참여율 높은 국가', byHighResp, false)}
            ${respPanel('참여율 낮은 국가', byLowResp, true)}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="font-size:11px;color:var(--text2);font-weight:700;display:flex;align-items:center;gap:5px;">
            <svg style="width:12px;height:12px;stroke:var(--text2);fill:none;stroke-width:2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            카테고리별 만족도
          </div>
          <div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:1;">
            <table class="sat-cat-matrix">
              <thead><tr>
                <th style="text-align:left">카테고리</th>
                <th>Line-up</th><th>Feature</th><th>Response</th>
              </tr></thead>
              <tbody>${matrixRows}</tbody>
            </table>
          </div>
          <div style="display:flex;gap:12px;padding:0 4px;">
            <span style="font-size:10px;color:var(--green)">● High (80%+)</span>
            <span style="font-size:10px;color:var(--yellow)">● Watch (60-79%)</span>
            <span style="font-size:10px;color:var(--red)">● Risk (&lt;60%)</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Reason Analysis ───────────────────────────────────────
function satRenderReasons(monthly) {
  if (!monthly) return `<div class="sat-section-card"></div>`;
  const reasons = monthly.reasons || {};
  const lu = reasons.lineup || {};
  const ft = reasons.feature || {};

  const reasonList = (obj, isPos, orderedKeys) => {
    // Show in fixed survey order, only items with count > 0
    const total = Object.values(obj||{}).reduce((s,v)=>s+v,0)||1;
    const entries = orderedKeys
      .filter(k => (obj||{})[k] > 0)
      .map(k => [k, obj[k]]);
    if (!entries.length) return `<div style="font-size:11px;color:var(--text2);padding:4px 0;font-style:italic;">응답 없음</div>`;
    return entries.map(([label,cnt],i) =>
      `<div class="sat-reason-li">
        <span class="sat-reason-li-no">${i+1}.</span>
        <span class="sat-reason-li-label">${label}</span>
        <span class="sat-reason-li-pct ${isPos?'pos':'neg'}">${Math.round(cnt/total*100)}%</span>
      </div>`
    ).join('');
  };

  const sectionHtml = (titleLabel, posObj, negObj, posKeys, negKeys) => `
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:10px;font-weight:800;color:var(--accent2);letter-spacing:.06em;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.07);">${titleLabel}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;">
        <div style="display:flex;flex-direction:column;">
          <div class="sat-reason-box pos" style="flex:1;">
            <div class="sat-reason-box-title pos">Positive</div>
            ${reasonList(posObj, true, posKeys)}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;">
          <div class="sat-reason-box neg" style="flex:1;">
            <div class="sat-reason-box-title neg">Negative</div>
            ${reasonList(negObj, false, negKeys)}
          </div>
        </div>
      </div>
    </div>`;

  return `
    <div class="sat-section-card" style="display:flex;flex-direction:column;">
      <div class="sat-section-header"><span class="sat-section-num">3</span> Reason Analysis</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;">
        ${sectionHtml('LINE-UP GUIDE', lu.positive, lu.negative,
            SAT_REASONS.lineup.positive, SAT_REASONS.lineup.negative)}
        ${sectionHtml('FEATURE LIBRARY', ft.positive, ft.negative,
            SAT_REASONS.feature.positive, SAT_REASONS.feature.negative)}
      </div>
    </div>
  `;
}

// ── Device Signal ─────────────────────────────────────────
function satRenderDevice(monthly) {
  if (!monthly) return `<div class="sat-section-card"></div>`;
  const devices = monthly.by_device || {};
  const pc  = devices.PC || {};
  const mob = devices.Mobile || {};
  const period = satFilters.period || SAT_DATA.meta.latest_period;

  const topNeg = (deviceName) => {
    const counts = {};
    SAT_DATA.responses
      .filter(r => r.period===period && r.device===deviceName && r.helpful==='No')
      .forEach(r => (r.neg_reasons||[]).forEach(rn => counts[rn]=(counts[rn]||0)+1));
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    return top ? top[0] : '–';
  };

  const negRate = (d) => d.total>0 ? ((d.helpful_no/d.total)*100).toFixed(0)+'%' : '–';

  const deviceCard = (icon, title, data, isRisk) => `
    <div class="sat-device-card-new ${isRisk?'risk':''}">
      <div class="sat-device-header-new">
        <span class="sat-device-icon">${icon}</span>
        <span class="sat-device-title-new">${title}</span>
        ${isRisk?'<span class="sat-watch-badge">주의</span>':''}
      </div>
      <div class="sat-device-row"><span>만족도</span><strong style="color:${(data.satisfaction_pct||0)>=75?'var(--green)':'var(--red)'};font-size:22px;font-weight:800">${(data.satisfaction_pct||0).toFixed(0)}%</strong></div>
      <div class="sat-device-row"><span>부정 응답률</span><strong>${negRate(data)}</strong></div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:var(--text2);">주요 이슈: <strong style="color:var(--yellow)">${topNeg(title.split('/')[0].trim())}</strong></div>
    </div>`;

  const pcIcon  = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="16" height="10" rx="1.5"/><path d="M7 17h6M10 13v4"/></svg>`;
  const mobIcon = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="2" width="10" height="16" rx="2"/><circle cx="10" cy="15.5" r=".7" fill="currentColor" stroke="none"/></svg>`;
  const infoIcon= `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="8"/><path d="M10 9v5M10 7h.01" stroke-linecap="round"/></svg>`;

  return `
    <div class="sat-section-card">
      <div class="sat-section-header"><span class="sat-section-num">4</span> Device Signal</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        ${deviceCard(pcIcon,  'PC / Mac', pc,  (pc.satisfaction_pct||0)<75)}
        ${deviceCard(mobIcon, 'Mobile',   mob, (mob.satisfaction_pct||0)<75)}
      </div>
    </div>
  `;
}

// ── Comments Explorer ─────────────────────────────────────
function satRenderCommentsExplorer(responses) {
  satCommentPage = 1;
  const withComment = responses.filter(r => r.comment?.trim());
  const commentCount = withComment.length;
  const bannerHtml = satNavBanner
    ? `<div class="sat-nav-banner">
        <span>${satNavBanner.text}</span>
        <button onclick="satResetNavBanner()">필터 초기화</button>
       </div>`
    : '';

  return `
    <div class="sat-section-card" style="margin-top:14px;" id="satCommentSection">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;">
        <div class="sat-section-header" style="margin-bottom:0;"><span class="sat-section-num">5</span> Customer Comments</div>
        <span style="font-size:11px;color:var(--text2);flex-shrink:0;">주관식 응답 ${commentCount}건</span>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">선택한 조건에서 작성된 주관식 응답 원문 확인</div>
      ${bannerHtml}
      <div id="satCommentsTable">${satBuildCommentsTable(responses)}</div>
    </div>
  `;
}

function satBuildCommentsTable(responses) {
  const withComment = responses.filter(r => r.comment?.trim());
  const start = (satCommentPage-1)*SAT_PER_PAGE;
  const pageItems = withComment.slice(start, start+SAT_PER_PAGE);
  const totalPages = Math.ceil(withComment.length/SAT_PER_PAGE);

  if (withComment.length === 0) return `<div style="padding:24px;text-align:center;color:var(--text2);font-size:12px;">주관식 응답이 없습니다.</div>`;

  const rows = pageItems.map(r => {
    const date  = (r.timestamp||'').split(' ')[0];
    const isNeg = r.helpful === 'No';
    const hlStyle = (satFilters.highlightNeg && isNeg) ? 'background:rgba(239,68,68,.07);' : '';
    return `<tr style="${hlStyle}">
      <td style="color:var(--text2);white-space:nowrap">${date}</td>
      <td style="font-weight:700">${r.country}</td>
      <td style="color:var(--text2)">${r.content_type==='lineup'?'Line-up':'Feature'}</td>
      <td>${canonicalCategory(r.category)}</td>
      <td><span class="sat-pill ${isNeg?'no':'yes'}">${isNeg?'Negative':'Positive'}</span></td>
      <td style="color:var(--text2);font-size:11px">${r.device_os||r.device||'–'}</td>
      <td style="color:var(--text);font-size:12px;max-width:320px;line-height:1.55;">${r.comment}</td>
    </tr>`;
  }).join('');

  const pagination = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:12px;">
      ${satCommentPage>1?`<button class="sat-export-btn" onclick="satPageNav(-1)">← 이전</button>`:''}
      <span style="font-size:11px;color:var(--text2)">${satCommentPage} / ${totalPages}</span>
      ${satCommentPage<totalPages?`<button class="sat-export-btn" onclick="satPageNav(1)">다음 →</button>`:''}
    </div>` : '';

  return `
    <div style="overflow-x:auto;">
      <table class="sat-comment-table">
        <thead><tr>
          <th>Date</th><th>Country</th><th>Content</th><th>Category</th>
          <th>Response</th><th>Device</th><th>Comment</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${pagination}
  `;
}

// ── Filter & Event Helpers ────────────────────────────────
function satSetFilter(key, val) {
  satFilters[key] = val;
  satCommentPage = 1;
  renderSatisfactionTab();
}

function satResetNavBanner() {
  satNavBanner = null;
  satFilters.country = 'all';
  satFilters.category = 'all';
  satFilters.highlightNeg = false;
  if (typeof setGlobalContentFilterUI === 'function') setGlobalContentFilterUI('ALL');
  satCommentPage = 1;
  renderSatisfactionTab();
}

function satPageNav(dir) {
  satCommentPage = Math.max(1, satCommentPage + dir);
  const responses = satFilteredResponses();
  const tableEl = document.getElementById('satCommentsTable');
  if (tableEl) { tableEl.innerHTML = satBuildCommentsTable(responses); }
}

function satExportCSV() {
  if (!SAT_DATA) return;
  const responses = SAT_DATA.responses; // 전체 원본 데이터 (필터 무관)
  const headers = ['No','Period','Date','Country','Content','Category','Helpful','Pos_Reasons','Neg_Reasons','Device','OS','Comment'];
  const rows = responses.map(r => [
    r.no, r.period,
    (r.timestamp||'').split(' ')[0],
    r.country, r.content_type, r.category, r.helpful,
    (r.pos_reasons||[]).join('|'),
    (r.neg_reasons||[]).join('|'),
    r.device||'', r.device_os||'',
    `"${(r.comment||'').replace(/"/g,'""')}"`
  ]);
  const csv = [headers, ...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'satisfaction_all_responses.csv';
  a.click();
}

function setGlobalContentFilterUI(ct) {
  if (typeof selectedContentType !== 'undefined') selectedContentType = ct;
  document.querySelectorAll('#filters [data-filter=ctype]').forEach(b => {
    b.classList.toggle('active', b.dataset.val === ct);
  });
}

function switchToSatisfaction(opts) {
  satFilters.highlightNeg = false;
  satNavBanner = null;
  let scrollToComments = false;

  if (opts) {
    // country
    if (typeof opts.country !== 'undefined') satFilters.country = opts.country;
    // category (canonicalize)
    if (typeof opts.category !== 'undefined')
      satFilters.category = opts.category === 'all' ? 'all' : canonicalCategory(opts.category);
    // content → update global content filter
    if (opts.content === 'lineup')   setGlobalContentFilterUI('lineup');
    else if (opts.content === 'feature') setGlobalContentFilterUI('feature_library');
    // highlight negative rows (legacy: commentChip:'negative')
    if (opts.commentChip === 'negative' || opts.highlightNeg) {
      satFilters.highlightNeg = true;
      scrollToComments = true;
    }
    // nav banner — only when specific country is given
    if (opts.country && opts.country !== 'all') {
      const ctLabel = opts.content === 'lineup' ? 'Line-up Guide' : opts.content === 'feature' ? 'Feature Library' : '';
      const catLabel = (opts.category && opts.category !== 'all') ? canonicalCategory(opts.category) : '';
      const parts = [opts.country, ctLabel, catLabel].filter(Boolean);
      satNavBanner = { text: `${parts.join(' · ')}의 Satisfaction Risk 관련 코멘트로 이동했습니다.` };
      scrollToComments = true;
    }
  }

  satCommentPage = 1;
  switchToPrimaryTab('satisfaction');
  if (scrollToComments) {
    setTimeout(() => {
      const el = document.getElementById('satCommentSection');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  }
}

function v03ExpandSignals(collapseEl, encodedItems) {
  try {
    const items = JSON.parse(decodeURIComponent(encodedItems));
    const rows = items.map(s => `<div class="v03-signal-row ${s.tone}">
      <div class="v03-signal-top">
        <span class="v03-signal-icon ${s.tone}">${iconSvg(s.tone === 'good' ? 'good' : s.tone === 'risk' ? 'alert' : 'watch', 'ui-icon tiny')}</span>
        <span class="v03-tag ${s.tone}">${s.type}</span>
        <span class="v03-signal-target">${s.target}</span>
      </div>
      <div class="v03-signal-desc">${s.desc}</div>
    </div>`).join('');
    // 접힌 행을 펼쳐진 행들로 대체
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:contents';
    wrapper.innerHTML = rows;
    collapseEl.replaceWith(...wrapper.children);
  } catch(e) { console.error(e); }
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}
</script>
<div id="v03-global-tip"></div>
</body>
