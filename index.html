    purchase_conv_prev: prev ? getMetricValue(metrics, prev, 'purchase_conversion') : null,
    purchase_intent_conv: getMetricValue(metrics, latest, 'purchase_intent_conversion') ?? getMetricValue(metrics, latest, 'purchase_intent'),
    purchase_intent_conv_prev: prev ? (getMetricValue(metrics, prev, 'purchase_intent_conversion') ?? getMetricValue(metrics, prev, 'purchase_intent')) : null,
    purchase_count: getMetricValue(metrics, latest, 'purchase'),
    organic: getMetricValue(metrics, latest, 'organic'),
    external: getMetricValue(metrics, latest, 'external_entrance') ?? getMetricValue(metrics, latest, 'external'),
    internal: getMetricValue(metrics, latest, 'internal'),
    engagement_rate: getMetricValue(metrics, latest, 'engagement_rate') ?? getMetricValue(metrics, latest, 'engagemet_rate'),
  };
}

function getPageLinksForSheet(item) {
  const pages = DATA?.pages || [];
  const localizedCountry = countryName(item.country);
  const countryCode = item.country;
  const category = String(item.category || '').toLowerCase();
  const isFeature = item.content_type === 'feature_library';
  return pages.filter(page => {
    const type = String(page.type || '').toLowerCase();
    const pageCountry = String(page.country || '');
    const pageCategory = String(page.category || '').toLowerCase();
    const countryMatch = pageCountry.includes(countryCode) || pageCountry.includes(localizedCountry);
    if (!countryMatch) return false;
    const typeMatch = isFeature ? (type.includes('feature') || type.includes('spec')) : type.includes('lineup');
    if (!typeMatch) return false;
    if (!pageCategory) return true;
    if (category === 'tv' && pageCategory.includes('tv')) return true;
    if (category === 'monitor' && (pageCategory.includes('monitor') || pageCategory.includes('모니터'))) return true;
    return pageCategory.includes(category);
  });
}

function computeDashboardSummary(sheets, latest, prev) {
  const summaries = {};
  sheets.forEach(([key, item]) => {
    summaries[key] = getSheetSummary(item, latest, prev);
  });

  const countryReports = {};
  sheets.forEach(([key, item]) => {
    const summary = summaries[key];
    const report = countryReports[item.country] ||= {
      total_sessions: 0,
      session_change_pct: null,
      total_clicks: 0,
      avg_plp_conv: null,
      avg_purchase_conv: null,
      total_purchases: 0,
      avg_duration: null,
      status: 'stable',
      links: [],
      analyst_notes: [],
      per_product: {},
    };
    report.total_sessions += summary.sessions || 0;
    report.total_clicks += summary.event_clicks || 0;
    report.total_purchases += summary.purchase_count || 0;
    report.avg_plp_conv = averageNumbers([report.avg_plp_conv, summary.plp_conv]);
    report.avg_purchase_conv = averageNumbers([report.avg_purchase_conv, summary.purchase_conv]);
    report.avg_duration = averageNumbers([report.avg_duration, summary.duration]);
    report.per_product[item.category] = {
      sessions: summary.sessions,
      page_views: summary.page_views,
      plp_conv: summary.plp_conv,
      purchase_conv: summary.purchase_conv,
      duration: summary.duration,
      clicks: summary.event_clicks,
      engagement_rate: summary.engagement_rate,
    };
    report.links.push(...getPageLinksForSheet(item));
    if (item.insights && item.insights.length) {
      report.analyst_notes.push({ page: item.category, notes: item.insights });
    }
  });

  Object.entries(countryReports).forEach(([country, report]) => {
    const previousSessions = sheets.reduce((sum, [key, item]) => item.country === country ? sum + (summaries[key].sessions_prev || 0) : sum, 0);
    report.session_change_pct = percentChange(report.total_sessions, previousSessions);
    const prevPlp = averageNumbers(
      sheets.filter(([, item]) => item.country === country).map(([key]) => summaries[key].plp_conv_prev)
    );
    const plpChange = percentChange(report.avg_plp_conv, prevPlp);
    const sessionChange = report.session_change_pct ?? 0;
    const safePlpChange = plpChange ?? 0;
    if (sessionChange >= 5 && safePlpChange > -10) report.status = 'growing';
    else if (sessionChange <= -10 || safePlpChange <= -10) report.status = 'declining';
    else report.status = 'stable';
    report.links = Array.from(new Map(report.links.filter(link => link.link).map(link => [link.link, link])).values());
  });

  const categoryReports = {};
  sheets.forEach(([key, item]) => {
    const summary = summaries[key];
    const entry = categoryReports[item.category] ||= {
      total_sessions: 0,
      avg_plp_conv: null,
      countries_count: 0,
      ranked_sessions: [],
      ranked_plp: [],
      ranked_duration: [],
    };
    entry.total_sessions += summary.sessions || 0;
    entry.avg_plp_conv = averageNumbers([entry.avg_plp_conv, summary.plp_conv]);
    entry.ranked_sessions.push([item.country, summary.sessions || 0]);
    entry.ranked_plp.push([item.country, summary.plp_conv || 0]);
    entry.ranked_duration.push([item.country, summary.duration || 0]);
  });

  Object.values(categoryReports).forEach(entry => {
    entry.countries_count = new Set(entry.ranked_sessions.map(([country]) => country.startsWith('CA-') ? 'CA' : country)).size;
    entry.ranked_sessions.sort((a, b) => b[1] - a[1]);
    entry.ranked_plp.sort((a, b) => b[1] - a[1]);
    entry.ranked_duration.sort((a, b) => b[1] - a[1]);
  });

  const rankedPlp = sheets
    .map(([key, item]) => [`${item.category} ${item.country}`, summaries[key].plp_conv])
    .filter(([, value]) => value != null)
    .sort((a, b) => b[1] - a[1]);

  const totalSessions = sheets.reduce((sum, [key]) => sum + (summaries[key].sessions || 0), 0);
  const totalSessionsPrev = sheets.reduce((sum, [key]) => sum + (summaries[key].sessions_prev || 0), 0);

  return {
    executive: {
      latest_month: latest,
      prev_month: prev,
      total_sessions: totalSessions,
      session_change_pct: percentChange(totalSessions, totalSessionsPrev),
      total_clicks: sheets.reduce((sum, [key]) => sum + (summaries[key].event_clicks || 0), 0),
      prev_total_clicks: sheets.reduce((sum, [key]) => sum + (summaries[key].event_clicks_prev || 0), 0),
      avg_plp_conv: averageNumbers(sheets.map(([key]) => summaries[key].plp_conv)),
      prev_avg_plp_conv: averageNumbers(sheets.map(([key]) => summaries[key].plp_conv_prev)),
      avg_purchase_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_conv)),
      avg_purchase_intent_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_intent_conv)),
      prev_avg_purchase_intent_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_intent_conv_prev)),
      total_pages_tracked: sheets.length,
      prev_total_pages_tracked: sheets.length,
      top_plp_pages: rankedPlp.slice(0, 3),
      low_plp_pages: rankedPlp.slice(-3),
    },
    country_reports: countryReports,
    category_reports: categoryReports,
    sheet_summaries: summaries,
  };
}

function getActiveSummary() {
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();
  const summary = computeDashboardSummary(sheets, latest, prev);
  const perContentType = {};
  ['lineup', 'feature_library'].forEach(ct => {
    const scoped = sheets.filter(([, item]) => item.content_type === ct);
    if (scoped.length) perContentType[ct] = computeDashboardSummary(scoped, latest, prev);
  });
  summary.per_content_type = perContentType;
  return summary;
}

function buildMonthlyInsightItems() {
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();
  const summary = getActiveSummary();
  const items = [];

  const topPlp = summary.executive?.top_plp_pages?.[0];
  if (topPlp) {
    items.push({
      type: 'success',
      priority: 'high',
      page: topPlp[0],
      metric: 'Conversion Efficiency',
      message: `${topPlp[0]} ${currentLang === 'ko' ? '페이지가' : 'leads'} ${((topPlp[1] || 0) * 100).toFixed(1)}% ${currentLang === 'ko' ? 'PLP 전환율을 기록했습니다.' : 'PLP conversion.'}`,
    });
  }

  const countryMovers = Object.entries(summary.country_reports || {}).sort((a, b) => (a[1].session_change_pct || -999) - (b[1].session_change_pct || -999));
  const weakestCountry = countryMovers[0];
  if (weakestCountry && (weakestCountry[1].session_change_pct || 0) <= -10) {
    items.push({
      type: 'warning',
      priority: 'high',
      page: weakestCountry[0],
      metric: 'Sessions',
      message: `${countryName(weakestCountry[0])} ${currentLang === 'ko' ? '세션이 전월 대비' : 'sessions changed'} ${(weakestCountry[1].session_change_pct || 0).toFixed(1)}% ${currentLang === 'ko' ? '변화했습니다. 유입 변화와 콘텐츠 상태를 확인하세요.' : 'vs previous month. Review traffic source and content freshness.'}`,
    });
  }

  const lowPlp = summary.executive?.low_plp_pages?.[0];
  if (lowPlp) {
    items.push({
      type: 'watch',
      priority: 'medium',
      page: lowPlp[0],
      metric: 'PLP',
      message: `${lowPlp[0]} ${currentLang === 'ko' ? '페이지의 PLP 전환율은' : 'shows'} ${((lowPlp[1] || 0) * 100).toFixed(1)}% ${currentLang === 'ko' ? '수준입니다. CTA와 비교 진입 구조를 점검하세요.' : 'PLP conversion. Review CTA and comparison-entry structure.'}`,
    });
  }

  const organicRisk = sheets.map(([key, data]) => {
    const metrics = data.metrics_2026 || {};
    const organic = getMetricValue(metrics, latest, 'organic') || 0;
    const external = (getMetricValue(metrics, latest, 'external_entrance') ?? getMetricValue(metrics, latest, 'external')) || 0;
    return { data, ratio: external > 0 ? organic / external : null };
  }).filter(item => item.ratio != null && item.ratio < 0.3).sort((a, b) => a.ratio - b.ratio)[0];
  if (organicRisk) {
    items.push({
      type: 'warning',
      priority: 'medium',
      page: `${organicRisk.data.category} ${organicRisk.data.country}`,
      metric: 'SEO',
      message: `${organicRisk.data.category} ${countryName(organicRisk.data.country)} ${currentLang === 'ko' ? '페이지는 오가닉 유입 비중이 낮습니다. 외부 유입 의존도를 줄일 SEO 개선이 필요합니다.' : 'has a low organic share. SEO work is needed to reduce reliance on non-organic traffic.'}`,
    });
  }

  if (prev) {
    const improving = sheets.map(([key, data]) => {
      const metrics = data.metrics_2026 || {};
      const current = getSheetSession(metrics, latest, data.category);
      const previous = getSheetSession(metrics, prev, data.category);
      return { data, change: percentChange(current, previous) };
    }).filter(item => item.change != null).sort((a, b) => b.change - a.change)[0];
    if (improving && improving.change > 0) {
      items.push({
        type: 'success',
        priority: 'medium',
        page: `${improving.data.category} ${improving.data.country}`,
        metric: 'Sessions',
        message: `${improving.data.category} ${countryName(improving.data.country)} ${currentLang === 'ko' ? '페이지는 전월 대비 세션이 가장 크게 증가했습니다.' : 'shows the strongest MoM session growth.'} ${improving.change.toFixed(1)}%.`,
      });
    }
  }
  return items.slice(0, 6);
}

async function loadData() {
  try {
    if (isLocalFileMode()) {
      showToast(currentLang === 'ko' ? '파일 직접 열기 상태입니다. Start Dashboard.command로 실행해 주세요.' : 'You are in file mode. Please use Start Dashboard.command.');
    }
    // Try API first (local server), fallback to static file (GitHub Pages)
    let resp;
    try {
      resp = await fetch('/api/data');
      if (!resp.ok) throw new Error();
    } catch {
      resp = await fetch('./data/data.json');
    }
    DATA = await resp.json();
    if (!getMonths().includes(selectedMonth)) selectedMonth = 'LATEST';
    try {
      const csvResp = await fetch('./data/page-links.csv', { cache: 'no-store' });
      if (csvResp.ok) {
        const csvText = await csvResp.text();
        const rows = parsePageLinksCsv(csvText);
        if (rows.length) DATA.pages = rows;
      }
    } catch {}
    render();
  } catch (e) {
    showToast(t('load_fail'));
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t('refreshing');
  try {
    // Try server-side refresh (local), fallback to static reload (deployed)
    let resp;
    try {
      resp = await fetch('/api/refresh');
      if (!resp.ok) throw new Error();
      const result = await resp.json();
      if (result.status === 'success') {
        showToast(t('refresh_success'));
        await loadData();
        return;
      } else {
        showToast(t('refresh_fail') + ': ' + result.message);
        return;
      }
    } catch {
      // Static mode: just re-fetch data.json
      await loadData();
      showToast(t('refresh_success'));
    }
  } catch (e) {
    showToast(t('refresh_fail') + ': ' + e.message);
  } finally {
    btn.disabled = false;
    btn.querySelector('[data-i18n]').textContent = t('refresh');
  }
}

function renderFilters() {
  const el = document.getElementById('filters');
  const ctypes = DATA.meta.content_types || ['lineup'];
  const countryOrder = ['UK', 'DE', 'FR', 'CA-EN', 'CA-FR', 'MX', 'BR', 'ES', 'IT', 'NL', 'PL'];
  const orderedCtypes = ['lineup', 'feature_library'].filter(ct => ctypes.includes(ct));
  const orderedCountries = [
    ...countryOrder.filter(code => (DATA.meta.countries || []).includes(code)),
    ...(DATA.meta.countries || []).filter(code => !countryOrder.includes(code)),
  ];
  ctypes.forEach(ct => {
    if (!orderedCtypes.includes(ct)) orderedCtypes.push(ct);
  });

  const showCountryAndCategory = ['countries', 'categories', 'rawdata'].includes(activePrimaryTab);

  let html = '';
  if (ctypes.length > 1) {
    html += `<div class="filter-level">
      <div class="filter-label filter-label-content">${sectionTag('lineup', t('filter_content'))}</div>
      <div class="filter-row">
        <button class="btn btn-outline ${selectedContentType === 'ALL' ? 'active' : ''}" data-filter="ctype" data-val="ALL"><span class="filter-btn-inner">${iconSvg('overview')}${t('all_content_types')}</span></button>`;
    orderedCtypes.forEach(ct => {
      const ctIcon = ct === 'feature_library' ? 'feature' : 'lineup';
      html += `<button class="btn btn-outline ${selectedContentType === ct ? 'active' : ''}" data-filter="ctype" data-val="${ct}"><span class="filter-btn-inner">${iconSvg(ctIcon)}${t('ctype_' + ct)}</span></button>`;
    });
    html += `</div></div>`;
  }

  if (showCountryAndCategory) {
    html += `<div class="filter-level">
      <div class="filter-label filter-label-country">${sectionTag('country', t('filter_country'))}</div>
      <div class="filter-row">
        <button class="btn btn-outline ${selectedCountry === 'ALL' ? 'active' : ''}" data-filter="country" data-val="ALL"><span class="filter-btn-inner">${iconSvg('country')}${t('all_countries')}</span></button>`;
    orderedCountries.forEach(c => {
      html += `<button class="btn btn-outline ${selectedCountry === c ? 'active' : ''}" data-filter="country" data-val="${c}"><span class="filter-btn-inner">${countryBadge(c)}${countryName(c)}</span></button>`;
    });
    html += `</div></div>`;

    html += `<div class="filter-level">
      <div class="filter-label filter-label-category">${sectionTag('sessions', t('filter_category'))}</div>
      <div class="filter-row">
        <button class="btn btn-outline ${selectedCategory === 'ALL' ? 'active' : ''}" data-filter="category" data-val="ALL"><span class="filter-btn-inner">${iconSvg('sessions')}${t('all_categories')}</span></button>`;
    sortCategories(DATA.meta.categories).forEach(c => {
      html += `<button class="btn btn-outline ${selectedCategory === c ? 'active' : ''}" data-filter="category" data-val="${c}"><span class="filter-btn-inner">${iconSvg(categoryIcon(c))}${categoryLabel(c)}</span></button>`;
    });
    html += `</div></div>`;
  }

  el.innerHTML = html;

  el.querySelectorAll('.btn-outline').forEach(btn => {
    btn.addEventListener('click', () => {
      const filterType = btn.dataset.filter;
      const val = btn.dataset.val;
      el.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (filterType === 'country') selectedCountry = val;
      else if (filterType === 'ctype') selectedContentType = val;
      else selectedCategory = val;
      render();
    });
  });
}

function getFilteredSheets(options = {}) {
  const { ignoreCountry = false } = options;
  return Object.entries(DATA.monthly_data).filter(([key, val]) => {
    if (selectedContentType !== 'ALL' && (val.content_type || 'lineup') !== selectedContentType) return false;
    if (!ignoreCountry && selectedCountry !== 'ALL' && val.country !== selectedCountry) return false;
    if (selectedCategory !== 'ALL' && val.category !== selectedCategory) return false;
    return true;
  });
}

function getAvailablePeriods() {
  return DATA?.meta?.periods_available || (DATA?.meta?.months_available || []).map(month => `2026-${month}`);
}
function getMonths() { return getAvailablePeriods(); }
function getPeriodParts(periodKey) {
  if (!periodKey) return { year: null, month: null };
  const [year, month] = String(periodKey).split('-', 2);
  return { year, month };
}
function getPeriodMonth(periodKey) {
  return getPeriodParts(periodKey).month;
}
function getPeriodYear(periodKey) {
  const year = getPeriodParts(periodKey).year;
  return year ? Number(year) : null;
}
function formatPeriodLabel(periodKey, localeMode = 'full') {
  const { year, month } = getPeriodParts(periodKey);
  if (!year || !month) return '—';
  if (currentLang === 'ko') {
    const monthNo = MONTH_TO_NUMBER[month] || month;
    if (localeMode === 'short') return `${String(year).slice(-2)}.${monthNo}`;
    if (localeMode === 'compact') return `${year}.${monthNo}`;
    return `${year}, ${month}`;
  }
  if (localeMode === 'short') return `${String(year).slice(-2)} ${month}`;
  if (localeMode === 'compact') return `${month} ${year}`;
  return `${year}, ${month}`;
}
function getSelectedMonthYearLabel() {
  return formatPeriodLabel(getLatestMonth(), 'compact');
}
function getLatestMonth() {
  const periods = getAvailablePeriods();
  if (!periods.length) return null;
  if (selectedMonth !== 'LATEST' && periods.includes(selectedMonth)) return selectedMonth;
  return periods[periods.length - 1];
}
function getPrevMonth() {
  const months = getAvailablePeriods();
  const current = getLatestMonth();
  const idx = months.indexOf(current);
  return idx > 0 ? months[idx - 1] : null;
}
function getPeriodLabels(periods, localeMode = 'short') {
  return periods.map(period => formatPeriodLabel(period, localeMode));
}

function findMetric(metrics, ...keywords) {
  for (const [key, val] of Object.entries(metrics)) {
    const lk = key.toLowerCase();
    if (keywords.every(kw => lk.includes(kw.toLowerCase()))) return val;
  }
  return null;
}

function getMetricValue(metrics, month, ...keywords) {
  let m = findMetric(metrics, ...keywords);
  // Fallback: try spec_library variants if lineup keywords fail
  if (!m) {
    const alt = keywords.map(kw => {
      if (kw === 'lineup') return 'spec_library';
      if (kw === 'tv_lineup') return 'tv_spec_library';
      if (kw === 'monitor_lineup') return 'monitor_spec_library';
      if (kw === 'line_up') return 'spec_library';
      if (kw === 'line_up_guide') return 'spec_library';
      if (kw === 'guide_event_click') return 'library_event_click';
      return kw;
    });
    if (alt.join() !== keywords.join()) m = findMetric(metrics, ...alt);
  }
  if (!m || !m.monthly || m.monthly[month] == null) return null;
  return m.monthly[month];
}

function formatNum(n, decimals = 0) {
  if (n == null) return '—';
  if (Math.abs(n) < 1 && n !== 0) return (n * 100).toFixed(1) + '%';
  return n.toLocaleString(currentLang === 'ko' ? 'ko-KR' : 'en-US', { maximumFractionDigits: decimals });
}

function formatDurationSeconds(seconds) {
  if (seconds == null) return '—';
  return `${Math.floor(seconds)}s`;
}

const CATEGORY_LABELS = {
  TV:      { ko: 'TV',    en: 'TV',         icon: 'sessions' },
  Monitor: { ko: '모니터', en: 'Monitor',    icon: 'overview' },
  Fridge:  { ko: '냉장고', en: 'Refrigerator', icon: 'notes'   },
  Laundry: { ko: '세탁기', en: 'Laundry',    icon: 'behavior' },
};
function categoryLabel(cat) {
  const entry = CATEGORY_LABELS[cat];
  if (!entry) return cat;
  return currentLang === 'ko' ? entry.ko : entry.en;
}
function categoryIcon(cat) {
  return (CATEGORY_LABELS[cat] || {}).icon || 'sessions';
}

// ── Category order constants ───────────────────────────────
const CATEGORY_ORDER = ['TV', 'Monitor', 'Fridge', 'Laundry'];
const CATEGORY_META = {
  TV:      { order: 0, aliases: ['TV'] },
  Monitor: { order: 1, aliases: ['Monitor'] },
  Fridge:  { order: 2, aliases: ['Fridge', 'REF', 'Refrigerator'] },
  Laundry: { order: 3, aliases: ['Laundry', 'WM'] },
};
function canonicalCategory(raw) {
  for (const [key, meta] of Object.entries(CATEGORY_META)) {
    if (meta.aliases.includes(raw)) return key;
  }
  return raw;
}
function sortCategories(arr) {
  return [...arr].sort((a, b) => {
    const oa = CATEGORY_META[canonicalCategory(a)]?.order ?? 999;
    const ob = CATEGORY_META[canonicalCategory(b)]?.order ?? 999;
    return oa !== ob ? oa - ob : a.localeCompare(b);
  });
}

function getTopCategoryName(perProduct = {}) {
  const entries = Object.entries(perProduct);
  if (!entries.length) return '—';
  return entries.sort((a, b) => (b[1]?.sessions || 0) - (a[1]?.sessions || 0))[0][0];
}

function getCategoryLinks(links = [], category) {
  return (links || []).filter(link => {
    const linkCategory = String(link.category || '').toUpperCase();
    return link.link && (!category || linkCategory === String(category).toUpperCase());
  });
}

function getContentScopeLabel(lineupLabel, featureLabel, allLabel = null) {

}

function getSessionSeries(metrics, periods, category) {
  return periods.map(period => {

    return value == null ? null : value;

function setChartEmptyState(canvasId, message) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !canvas.parentElement) return;
  if (charts[canvasId]) {
    charts[canvasId].destroy();
    delete charts[canvasId];
  }
  canvas.style.display = 'none';
  let empty = canvas.parentElement.querySelector('.chart-empty-state');
  if (!empty) {
    empty = document.createElement('div');
    empty.className = 'chart-empty-state';
    canvas.parentElement.appendChild(empty);
  }
  empty.textContent = message;
}

function clearChartEmptyState(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !canvas.parentElement) return;
  canvas.style.display = '';
  const empty = canvas.parentElement.querySelector('.chart-empty-state');
  if (empty) empty.remove();
}

function calcChange(curr, prev) {
  if (prev == null || prev === 0 || curr == null) return null;
  return ((curr - prev) / Math.abs(prev)) * 100;
}

function getChartColors() {
  const style = getComputedStyle(document.documentElement);
  return {
    grid: style.getPropertyValue('--chart-grid').trim() || 'rgba(42,42,58,0.5)',
    text: style.getPropertyValue('--chart-text').trim() || '#8888a0',
  };
}

function renderGlobalMonthPicker() {
  const el = document.getElementById('globalMonthPicker');
  if (!el) return;
  const periods = getMonths();
  if (!periods.length) {
    el.innerHTML = '';
    return;
  }
  const current = getLatestMonth();
  el.innerHTML = `
    <button class="month-picker-trigger" type="button" aria-expanded="false" onclick="toggleMonthPicker()">
      <span class="month-trigger-main">
        ${iconSvg('overview')}
        <span class="month-trigger-copy">
          <span class="month-trigger-value">${getSelectedMonthYearLabel()}</span>
        </span>
      </span>
      <span class="caret">${iconSvg('chevron_down','ui-icon tiny')}</span>
    </button>
    <div class="month-picker-menu">
      ${periods.map(period => `
        <button class="month-picker-option ${current === period ? 'active' : ''}" type="button" onclick="selectGlobalMonth('${period}')">
          <span>${formatPeriodLabel(period, 'compact')}</span>
          ${current === period ? iconSvg('good', 'ui-icon tiny') : ''}
        </button>
      `).join('')}
    </div>
  `;
  el.classList.remove('open');
}

function toggleMonthPicker(forceOpen) {
  const el = document.getElementById('globalMonthPicker');
  if (!el) return;
  const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !el.classList.contains('open');
  el.classList.toggle('open', shouldOpen);
  const trigger = el.querySelector('.month-picker-trigger');
  if (trigger) trigger.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
}

function selectGlobalMonth(month) {
  selectedMonth = month;
  toggleMonthPicker(false);
  render();
}

  // Switch to the sub-tab

  ['actions','countries','categories','direction'].forEach(p => {
    document.getElementById('insightPanel-' + p).style.display = p === subTab ? 'block' : 'none';

function renderOverview() {
  const months = getMonths();
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();

  document.getElementById('latestMonthBadge').textContent = formatPeriodLabel(latest, 'compact');

  let totalSessions=0, prevSessions=0, totalPageViews=0, prevPageViews=0;
  let totalEngaged=0, prevEngaged=0, totalClicks=0, prevClicks=0;
  let convRates=[], prevConvRates=[];

  sheets.forEach(([key, data]) => {
    const m = data.metrics_2026;
    const sess = getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;
    totalSessions+=sess;
    if(prev) prevSessions+=getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0;
    const pv=getMetricValue(m,latest,'line_up')||getMetricValue(m,latest,'lineup')||0;
    if(pv<10000){totalPageViews+=pv; if(prev) prevPageViews+=getMetricValue(m,prev,'line_up')||getMetricValue(m,prev,'lineup')||0;}
    totalEngaged+=getMetricValue(m,latest,'engaged')||0;
    if(prev) prevEngaged+=getMetricValue(m,prev,'engaged')||0;
    totalClicks+=getMetricValue(m,latest,'event_click')||getMetricValue(m,latest,'guide_event_click')||0;
    if(prev) prevClicks+=getMetricValue(m,prev,'event_click')||getMetricValue(m,prev,'guide_event_click')||0;
    const conv=getMetricValue(m,latest,'plp_conversion'); if(conv!=null) convRates.push(conv);
    if(prev){const pc=getMetricValue(m,prev,'plp_conversion'); if(pc!=null) prevConvRates.push(pc);}
  });

  const avgConv=convRates.length?convRates.reduce((a,b)=>a+b,0)/convRates.length:null;
  const prevAvgConv=prevConvRates.length?prevConvRates.reduce((a,b)=>a+b,0)/prevConvRates.length:null;

  document.getElementById('kpiGrid').innerHTML=[
    kpiCard(getRawDataSessionsLabel(),totalSessions,calcChange(totalSessions,prevSessions)),
    kpiCard(getRawDataPageViewsLabel(),totalPageViews,calcChange(totalPageViews,prevPageViews)),
    kpiCard(t('kpi_engaged'),totalEngaged,calcChange(totalEngaged,prevEngaged)),
    kpiCard(t('kpi_clicks'),totalClicks,calcChange(totalClicks,prevClicks)),
    kpiCard(t('kpi_plp_conv'),avgConv,calcChange(avgConv,prevAvgConv)),
    kpiCard(t('kpi_pages_tracked'),sheets.length,null),
  ].join('');

  const chartsEl=document.getElementById('overviewCharts');
  chartsEl.innerHTML=`
    <div class="chart-card"><h3>${chartTitle('sessions', getContentScopeLabel('Sessions by Country (Lineup Guide)', 'Sessions by Country (Feature Library)', 'Sessions by Country'))}</h3><canvas id="chartSessionsByCountry"></canvas></div>
    <div class="chart-card"><h3>${chartTitle('overview', t('chart_pv_trend'))}</h3><canvas id="chartPageViewsTrend"></canvas></div>
    <div class="chart-card"><h3>${chartTitle('behavior', t('chart_engagement'))}</h3><canvas id="chartEngagementRate"></canvas></div>
    <div class="chart-card"><h3>${chartTitle('conversion', t('chart_conversion'))}</h3><canvas id="chartConversion"></canvas></div>
  `;

  const countrySessionData={};
  sheets.forEach(([key,data])=>{
    const label=data.country;
    const sess=getMetricValue(data.metrics_2026,latest,'lineup','session')||getMetricValue(data.metrics_2026,latest,'tv_lineup','session')||getMetricValue(data.metrics_2026,latest,'monitor_lineup','session')||0;
    countrySessionData[label]=(countrySessionData[label]||0)+sess;
  });
  createChart('chartSessionsByCountry','bar',{
    labels:Object.keys(countrySessionData).map(c=>countryName(c)),
    datasets:[{data:Object.values(countrySessionData),backgroundColor:Object.keys(countrySessionData).map(c=>COLORS[c]||'#6366f1'),borderRadius:6}]
  },{plugins:{legend:{display:false}}});

  if(months.length>0){
    const trendDatasets=[];
    sheets.forEach(([key,data])=>{
      const m=data.metrics_2026;
      const pvMetric=findMetric(m,'line_up')||findMetric(m,'lineup');
      if(!pvMetric) return;
      const vals=months.map(mo=>pvMetric.monthly[mo]||null);
      if(vals.every(v=>v===null||v>5000)) return;
      trendDatasets.push({label:`${data.category} ${countryName(data.country)}`,data:vals,borderColor:COLORS[data.country]||'#6366f1',borderWidth:2,tension:0.3,pointRadius:4,fill:false});
    });
    createChart('chartPageViewsTrend','line',{labels:getPeriodLabels(months),datasets:trendDatasets},{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10}}}}});
  }

  const engLabels=[],engData=[];
  sheets.forEach(([key,data])=>{
    const rate=getMetricValue(data.metrics_2026,latest,'engagem')||getMetricValue(data.metrics_2026,latest,'engagement');
    if(rate!=null&&rate<=2){engLabels.push(`${data.category} ${countryName(data.country)}`);engData.push(rate);}
  });
  createChart('chartEngagementRate','bar',{
    labels:engLabels,
    datasets:[{data:engData.map(v=>v*100),backgroundColor:engData.map(v=>v>=0.7?'rgba(34,197,94,0.7)':v>=0.5?'rgba(234,179,8,0.7)':'rgba(239,68,68,0.7)'),borderRadius:6}]
  },{plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'%'}}}});

  const convLabels=[],convData=[];
  sheets.forEach(([key,data])=>{
    const rate=getMetricValue(data.metrics_2026,latest,'plp_conversion');
    if(rate!=null){convLabels.push(`${data.category} ${countryName(data.country)}`);convData.push(rate);}
  });
  createChart('chartConversion','bar',{
    labels:convLabels,datasets:[{data:convData.map(v=>v*100),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:6}]
  },{plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'%'}}}});

  renderComparisonTable(sheets,latest,prev);
}

function renderComparisonTable(sheets,latest,prev){
  const table=document.getElementById('comparisonTable');
  let html=`<thead><tr><th>${t('th_page')}</th><th>${t('th_sessions')}</th><th>${t('th_pageviews')}</th><th>${t('th_engagement')}</th><th>${t('th_event_clicks')}</th><th>${t('th_plp_conv')}</th><th>${t('th_purch_conv')}</th><th>${t('th_mom_sessions')}</th></tr></thead><tbody>`;

  sheets.forEach(([key,data])=>{
    const m=data.metrics_2026;
    const ctypeTag=selectedContentType==='ALL'&&data.content_type?(data.content_type==='feature_library'?' [FL]':' [LG]'):'';
    const label=`${data.category} ${countryName(data.country)}${ctypeTag}`;
    const sess=getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;
    const prevSess=prev?(getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0):0;
    const pv=getMetricValue(m,latest,'line_up')||0;
    const eng=getMetricValue(m,latest,'engagem');
    const clicks=getMetricValue(m,latest,'event_click')||getMetricValue(m,latest,'guide_event_click')||0;
    const plpConv=getMetricValue(m,latest,'plp_conversion');
    const purchConv=getMetricValue(m,latest,'purchase_conversion');
    const change=calcChange(sess,prevSess);
    html+=`<tr><td><strong>${label}</strong></td><td>${formatNum(sess)}</td><td>${formatNum(pv)}</td><td>${eng!=null?formatNum(eng):'—'}</td><td>${formatNum(clicks)}</td><td>${plpConv!=null?formatNum(plpConv):'—'}</td><td>${purchConv!=null?formatNum(purchConv):'—'}</td><td class="${change>0?'kpi-change up':change<0?'kpi-change down':''}">${change!=null?(change>0?'+':'')+change.toFixed(1)+'%':'—'}</td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function renderAcquisition(){

  const chartsEl=document.getElementById('acqCharts');

  `;

  createChart('chartTrafficSource','doughnut',{
    labels:[t('lbl_organic'),t('lbl_others'),t('lbl_internal')],
    datasets:[{data:[totalOrganic,totalExternal-totalOrganic,totalInternal],backgroundColor:['rgba(34,197,94,0.8)','rgba(99,102,241,0.8)','rgba(234,179,8,0.8)']}]
  },{plugins:{legend:{position:'bottom'},doughnutPercentagePlugin:{display:true,color:'#ffffff',font:'600 11px "IBM Plex Sans", sans-serif'}}});

  if(months.length>0){
    const datasets=[];
    sheets.forEach(([key,data])=>{
      const series = getSessionSeries(data.metrics_2026, months, data.category);

    });
    if (datasets.length) {
      clearChartEmptyState('chartSessionTrend');
      createChart('chartSessionTrend','line',{labels:getPeriodLabels(months),datasets},{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10}}}}});
    } else {
      setChartEmptyState('chartSessionTrend', currentLang === 'ko' ? '현재 필터 조건에 해당하는 세션 추이 데이터가 없습니다.' : 'No session trend data is available for the current filter.');
    }
  }

  const exitLabels=[],exitData=[];
  sheets.forEach(([key,data])=>{
    const rate=getMetricValue(data.metrics_2026,latest,'exit_rate');
    if(rate!=null&&rate<=2){exitLabels.push(`${data.category} ${countryName(data.country)}`);exitData.push(rate);}
  });
  if (exitLabels.length) {
    clearChartEmptyState('chartExitRate');
    createChart('chartExitRate','bar',{labels:exitLabels,datasets:[{data:exitData.map(v=>v*100),backgroundColor:exitData.map(v=>v<0.4?'rgba(34,197,94,0.7)':v<0.6?'rgba(234,179,8,0.7)':'rgba(239,68,68,0.7)'),borderRadius:6}]},{plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'%'}}}});
  } else {
    setChartEmptyState('chartExitRate', currentLang === 'ko' ? '현재 필터 조건에 해당하는 Exit Rate 데이터가 원본 워크북에 없습니다.' : 'No exit rate data is available in the workbook for the current filter.');
  }

  const countryTraffic={};
  sheets.forEach(([key,data])=>{
    const label=countryName(data.country);
    const entry=countryTraffic[label] ||= { internal: 0, external: 0 };
    entry.internal += getMetricValue(data.metrics_2026,latest,'internal')||0;
    entry.external += getMetricValue(data.metrics_2026,latest,'external')||0;
  });
  const intExtLabels=[],intData=[],extData=[];
  Object.entries(countryTraffic).forEach(([label, values]) => {
    if(values.internal>0||values.external>0){
      intExtLabels.push(label);
      intData.push(values.internal);
      extData.push(values.external);
    }
  });
  createChart('chartIntExt','bar',{labels:intExtLabels,datasets:[
    {label:t('lbl_internal'),data:intData,backgroundColor:'rgba(234,179,8,0.7)',borderRadius:6},
    {label:t('lbl_external'),data:extData,backgroundColor:'rgba(99,102,241,0.7)',borderRadius:6}
  ]},{plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}}});
}

function getSeasonContext(countryCode) {
  const m = new Date().getMonth();
  const southern = ['BR', 'MX'];
  const isSouthern = southern.includes(countryCode);
  const effectiveMonth = isSouthern ? (m + 6) % 12 : m;
  if (effectiveMonth >= 2 && effectiveMonth <= 4) return t('signal_context_spring');
  if (effectiveMonth >= 5 && effectiveMonth <= 7) return t('signal_context_summer');
  if (effectiveMonth >= 8 && effectiveMonth <= 10) return t('signal_context_fall');
  return t('signal_context_winter');
}

function getSignalLevel(momPct) {
  if (momPct <= -15) return 'sig-red';
  if (momPct >= 15) return 'sig-green';
  return 'sig-yellow';
}

function toggleSignalCard(event, card) {
  const interactive = event.target.closest('a, button');
  if (interactive) return;
  card.classList.toggle('open');
}

function generateActionItems(sheets,latest,prev){
  const actions=[],months=getMonths();

  const decliningPages=[];
  sheets.forEach(([key,data])=>{const m=data.metrics_2026;if(!prev)return;const curr=getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;const prv=getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0;if(prv>0&&curr<prv*0.8){decliningPages.push(`${data.category} ${countryName(data.country)} (${((curr-prv)/prv*100).toFixed(0)}%)`);}});
  if(decliningPages.length>0) actions.push({urgency:'urgent',icon:'!!',text:`<strong>${t('act_investigate')}</strong> ${decliningPages.join(', ')}. ${t('act_investigate_desc')}`});

  const lowEngPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'engagem');if(rate!=null&&rate<0.5){lowEngPages.push(`${data.category} ${countryName(data.country)} (${(rate*100).toFixed(0)}%)`);}});
  if(lowEngPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_engagement')}</strong> ${lowEngPages.join(', ')} ${t('act_engagement_desc')}`});

  const highExitPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'exit_rate','line');if(rate!=null&&rate>0.5&&rate<=2){highExitPages.push(`${data.category} ${countryName(data.country)} (${(rate*100).toFixed(0)}%)`);}});
  if(highExitPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_exit')}</strong> ${highExitPages.join(', ')} ${t('act_exit_desc')}`});

  const lowPurchPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'purchase_conversion');if(rate!=null&&rate<0.01){lowPurchPages.push(`${data.category} ${countryName(data.country)}`);}});
  if(lowPurchPages.length>0) actions.push({urgency:'monitor',icon:'i',text:`<strong>${t('act_purchase')}</strong> ${lowPurchPages.join(', ')} ${t('act_purchase_desc')}`});

  const lowOrganicPages=[];
  sheets.forEach(([key,data])=>{const org=getMetricValue(data.metrics_2026,latest,'organic')||0;const ext=getMetricValue(data.metrics_2026,latest,'external')||0;if(ext>0&&org/ext<0.3){lowOrganicPages.push(`${data.category} ${countryName(data.country)}`);}});
  if(lowOrganicPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_seo')}</strong> ${lowOrganicPages.join(', ')} ${t('act_seo_desc')}`});

  actions.push({urgency:'monitor',icon:'i',text:`<strong>${t('act_monitor')}</strong> ${months.length} ${t('act_monitor_desc')}`});

  return actions;
}

function parsePageLinksCsv(text) {
  const lines = String(text || '')
    .replace(/^\uFEFF/, '')
    .split(/\r?\n/)
    .filter(line => line.trim());
  if (lines.length < 2) return [];

  const parseLine = (line) => {
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === ',' && !inQuotes) {
        cells.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
    cells.push(current.trim());
    return cells;
  };

  const headers = parseLine(lines[0]).map(header => header.trim());
  const required = ['country', 'category', 'type', 'link', 'feedback', 'ga_tagged', 'live_status', 'breadcrumb'];
  return lines.slice(1).map(parseLine).map(values => {
    const row = {};
    headers.forEach((header, index) => {
      row[header] = (values[index] || '').replace(/^"(.*)"$/, '$1').trim();
    });
    return row;
  }).filter(row => required.every(field => field in row) && row.link && row.link.startsWith('http'));
}

function renderPageLinksDrawer() {
  if (!DATA || !DATA.pages) return;
  const body = document.getElementById('linksDrawerBody');
  const grouped = {};
  (DATA.pages || []).forEach(p => {

    const country = p.country || 'Other';
    if (!grouped[country]) grouped[country] = [];
    grouped[country].push(p);

  let html = '';
  Object.keys(grouped).sort().forEach(country => {
    html += `<div class="links-country-group" data-country="${country}">`;
    html += `<div class="links-country-label">${country}</div>`;
    grouped[country].forEach(p => {

const doughnutPercentagePlugin = {
  id: 'doughnutPercentagePlugin',
  afterDatasetsDraw(chart, args, pluginOptions) {
    if (!pluginOptions || !pluginOptions.display) return;
    const { ctx } = chart;
    const dataset = chart.data.datasets?.[0];
    const meta = chart.getDatasetMeta(0);
    if (!dataset || !meta?.data?.length) return;
    const values = dataset.data || [];
    const total = values.reduce((sum, value) => sum + (Number(value) || 0), 0);
    if (!total) return;
    ctx.save();
    ctx.font = pluginOptions.font || '600 11px sans-serif';
    ctx.fillStyle = pluginOptions.color || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    meta.data.forEach((arc, index) => {
      const value = Number(values[index]) || 0;
      if (!value) return;
      const pct = value / total;
      if (pct < 0.06) return;
      const pos = arc.tooltipPosition();
      ctx.fillText(`${Math.round(pct * 100)}%`, pos.x, pos.y);
    });
    ctx.restore();
  }
};

function fadeColor(color, alpha = 0.18) {
  if (!color) return `rgba(148,163,184,${alpha})`;
  if (typeof color !== 'string') return color;
  const value = color.trim();
  if (value.startsWith('rgba(')) {
    const parts = value.slice(5, -1).split(',').map(v => v.trim());
    return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
  }
  if (value.startsWith('rgb(')) {
    const parts = value.slice(4, -1).split(',').map(v => v.trim());
    return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
  }
  if (value.startsWith('#')) {
    const hex = value.slice(1);
    const full = hex.length === 3 ? hex.split('').map(ch => ch + ch).join('') : hex;
    const int = parseInt(full, 16);
    const r = (int >> 16) & 255;
    const g = (int >> 8) & 255;
    const b = int & 255;
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }
  return color;
}

function applyLineHoverState(chart, activeElements) {
  if (!chart || chart.config.type !== 'line') return;
  const hoveredDatasetIndex = activeElements && activeElements.length ? activeElements[0].datasetIndex : null;
  chart.data.datasets.forEach((dataset, index) => {
    const baseBorderWidth = dataset._baseBorderWidth ?? dataset.borderWidth ?? 2;
    const basePointRadius = dataset._basePointRadius ?? dataset.pointRadius ?? 3;
    const baseBorderColor = dataset._baseBorderColor ?? dataset.borderColor;
    dataset._baseBorderWidth = baseBorderWidth;
    dataset._basePointRadius = basePointRadius;
    dataset._baseBorderColor = baseBorderColor;

    if (hoveredDatasetIndex == null) {
      dataset.borderWidth = baseBorderWidth;
      dataset.pointRadius = basePointRadius;
      dataset.borderColor = baseBorderColor;
      dataset.borderDash = dataset._baseBorderDash ?? dataset.borderDash ?? [];
      return;
    }

    if (index === hoveredDatasetIndex) {
      dataset.borderWidth = Math.max(baseBorderWidth + 1.5, 4);
      dataset.pointRadius = Math.max(basePointRadius + 1, 5);
      dataset.borderColor = baseBorderColor;
      dataset.borderDash = [];
    } else {
      dataset.borderWidth = Math.max(baseBorderWidth - 0.5, 1);
      dataset.pointRadius = Math.max(basePointRadius - 1, 2);
      dataset.borderColor = fadeColor(baseBorderColor, 0.18);
      dataset.borderDash = [4, 4];
    }
  });
  chart.update('none');
}

function createChart(canvasId,type,data,options={}){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  if(charts[canvasId]) charts[canvasId].destroy();

  const cc=getChartColors();
  const defaultOptions={
    responsive:true,maintainAspectRatio:true,
    interaction:{mode:'nearest',intersect:false},
    onHover:(event, activeElements, chart)=>{
      canvas.style.cursor = activeElements && activeElements.length ? 'pointer' : 'default';
      applyLineHoverState(chart, activeElements);
    },
    plugins:{legend:{labels:{color:cc.text,font:{size:11}}},tooltip:{enabled:true}},
    scales:type==='doughnut'||type==='pie'?{}:{
      x:{ticks:{color:cc.text,font:{size:10}},grid:{color:cc.grid}},
      y:{ticks:{color:cc.text,font:{size:10}},grid:{color:cc.grid}}
    }
  };
  charts[canvasId]=new Chart(canvas,{
    type,
    data,
    options:mergeDeep(defaultOptions,options),
    plugins:type==='doughnut' || type==='pie' ? [doughnutPercentagePlugin] : []
  });
}

function mergeDeep(target,source){
  const output={...target};
  for(const key in source){
    if(source[key]&&typeof source[key]==='object'&&!Array.isArray(source[key])){output[key]=mergeDeep(target[key]||{},source[key]);}
    else{output[key]=source[key];}
  }
  return output;
}

function v03MetricValue(item, month, ...keys) {

function v03Session(item, month) {

    || v03MetricValue(item, month, 'monitor_lineup', 'session')
    || v03MetricValue(item, month, 'refrigerator_lineup', 'session')
    || v03MetricValue(item, month, 'laundry_lineup', 'session')
    || v03MetricValue(item, month, 'spec_library', 'session')

function v03SumMetric(sheets, month, getter) {
  return sheets.reduce((sum, [, item]) => sum + (getter(item, month) || 0), 0);
}

function v03AvgMetric(sheets, month, ...keys) {
  return averageNumbers(sheets.map(([, item]) => v03MetricValue(item, month, ...keys)));
}

function v03TrendText(change, unit = '%') {
  if (change == null || Number.isNaN(change)) return '— MoM';
  const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '—';
  const sign = change > 0 ? '+' : '';
  return `${arrow} ${sign}${change.toFixed(1)}${unit} MoM`;
}

function v03DeltaClass(change, positiveIsGood = true) {
  if (change == null || Number.isNaN(change) || change === 0) return 'neutral';
  const good = positiveIsGood ? change > 0 : change < 0;
  return good ? 'up' : 'down';
}

function v03MetricRow(label, value, delta, positiveIsGood = true, unit = '%') {

    <div class="v03-delta ${v03DeltaClass(delta, positiveIsGood)}">${v03TrendText(delta, unit)}</div>

}

function v03MetricItem(label, value, delta, positiveIsGood = true, unit = '%') {

    <span class="v03-metric-value">${value}</span>

function v03GetSatisfactionSummary() {
  if (DASHBOARD_DATA && DASHBOARD_DATA.kpi && DASHBOARD_DATA.kpi.satisfaction) {
    const s = DASHBOARD_DATA.kpi.satisfaction;
    return {
      score: Math.round((s.overall.value || 0) * 100),
      scoreMom: null,
      responses: s.responses.value || 0,
      responsesMom: null,
      negativeRate: Math.round((s.negativeRate.value || 0) * 100),
      negativeMom: null,
      positiveRate: Math.round((s.overall.value || 0) * 100),
      positiveMom: null,
      negativeShare: Math.round((s.negativeRate.value || 0) * 100),
      negativeShareMom: null,
      mobileShare: 0,
      mobileShareMom: null,
      isSample: s.isSample === true
    };
  }
  if (!SAT_DATA) {
    return { score:0, scoreMom:null, responses:0, responsesMom:null, negativeRate:0, negativeMom:null,
             positiveRate:0, positiveMom:null, negativeShare:0, negativeShareMom:null,
             mobileShare:0, mobileShareMom:null, isSample: false };
  }
  const p  = SAT_DATA.meta.latest_period;
  const pp = SAT_DATA.meta.prev_period;
  const m  = SAT_DATA.monthly[p]  || {};
  const pm = pp && SAT_DATA.prev_monthly ? (SAT_DATA.prev_monthly[pp] || {}) : {};
  const score       = m.satisfaction_pct != null ? Math.round(m.satisfaction_pct) : 0;
  const pScore      = pm.satisfaction_pct != null ? Math.round(pm.satisfaction_pct) : score;
  const responses   = m.total || 0;
  const pResponses  = pm.total || 0;
  const negRate     = m.negative_rate != null ? Math.round(m.negative_rate) : 0;
  const pNegRate    = pm.negative_rate != null ? Math.round(pm.negative_rate) : negRate;
  const posRate     = m.positive_rate != null ? Math.round(m.positive_rate) : 0;
  const pPosRate    = pm.positive_rate != null ? Math.round(pm.positive_rate) : posRate;
  const negShare    = m.satisfaction_pct != null ? Math.round(100 - m.satisfaction_pct) : 0;
  const pNegShare   = pm.satisfaction_pct != null ? Math.round(100 - pm.satisfaction_pct) : negShare;
  const mobilePct   = m.mobile_pct != null ? Math.round(m.mobile_pct) : 0;
  const pMobilePct  = pm.mobile_pct != null ? Math.round(pm.mobile_pct) : mobilePct;
  return {
    score, scoreMom: pp ? score - pScore : null,
    responses, responsesMom: (pp && pResponses) ? Math.round((responses - pResponses) / pResponses * 100) : null,
    negativeRate: negRate, negativeMom: pp ? negRate - pNegRate : null,
    positiveRate: posRate, positiveMom: pp ? posRate - pPosRate : null,
    negativeShare: negShare, negativeShareMom: pp ? negShare - pNegShare : null,
    mobileShare: mobilePct, mobileShareMom: pp ? mobilePct - pMobilePct : null,
    isSample: SAT_DATA.isSample === true
  };
}

function v03ActionStateKey(id, owner) {
  return `v03_action_${id}_${owner}`;
}

function v03StatusClass(status) {
  if (status === '진행 중') return 'doing';
  if (status === '완료') return 'done';
  if (status === '보류') return 'hold';
  return '';
}

function v03GetStatus(id, owner, fallback) {
  return localStorage.getItem(v03ActionStateKey(id, owner)) || fallback;
}

function v03SetActionStatus(id, owner, value) {
  localStorage.setItem(v03ActionStateKey(id, owner), value);
  const tsKey = v03ActionStateKey(id, owner) + '_completedAt';
  if (value === '완료') {
    const now = new Date();
    const label = `${now.getMonth() + 1}월 ${now.getDate()}일`;
    localStorage.setItem(tsKey, label);
  } else {
    localStorage.removeItem(tsKey);
  }
  renderActionTodosNew();
}

function v03GetCompletedAt(id, owner) {
  return localStorage.getItem(v03ActionStateKey(id, owner) + '_completedAt') || '';
}

function v03GetTaskAggregate(slug, tasks) {

  tasks.forEach((task, i) => {

  if (!DASHBOARD_DATA) return fallback || '';

function v03ShowTip(el) {
  const tip = document.getElementById('v03-global-tip');
  tip.innerHTML = el.dataset.tiphtml || '';
  tip.style.display = 'block';
  const rect = el.getBoundingClientRect();
  const tipW = tip.offsetWidth;
  const tipH = tip.offsetHeight;
  let top  = rect.top - tipH - 8;
  let left = rect.left + rect.width / 2 - tipW / 2;
  if (top < 8) top = rect.bottom + 8;
  if (left < 8) left = 8;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  tip.style.top  = top  + 'px';
  tip.style.left = left + 'px';
}
function v03HideTip() {
  const tip = document.getElementById('v03-global-tip');
  if (tip) tip.style.display = 'none';
}

function v03ToggleComboChip(chipEl, slug, sec) {
  const wrap = document.getElementById('v03-affected-' + slug);
  if (!wrap) return;
  const isActive = chipEl.classList.contains('active');
  chipEl.closest('.v03-combo-chips').querySelectorAll('.v03-combo-chip').forEach(c => c.classList.remove('active'));
  const rows = wrap.querySelectorAll('tbody tr');
  rows.forEach(r => r.classList.remove('v03-row-hl', 'v03-row-dim'));
  if (!isActive) {
    chipEl.classList.add('active');
    rows.forEach(r => {
      const secs = (r.dataset.combosec || '').split(',');
      if (secs.includes(sec)) r.classList.add('v03-row-hl');
      else r.classList.add('v03-row-dim');
    });
  }
}

// ============================================================
// V03 Data Mapping Layer
// Excel → Dashboard 지표 정규화 + 신호 감지
// 내일 최신 엑셀 파일 연결 시 이 레이어만 수정하면 됨
// ============================================================

/**
 * sheet item 하나에서 최신/전월 지표를 추출·정규화
 * @param {object} item  - getFilteredSheets()의 각 [key, item]에서 item
 * @param {string} latest - 'YYYY-MM' 형식의 최신 월
 * @param {string|null} prev  - 전월 (없으면 null)
 * @returns {object} 정규화된 지표 객체
 */
function v03ComputeSheetMetrics(item, latest, prev) {
  const get = (month, ...keys) => getMetricValue(item.metrics_2026 || {}, month, ...keys);

  // ── Sessions ──────────────────────────────────────
  const sessions    = v03Session(item, latest) || 0;
  const prevSessions = prev ? (v03Session(item, prev) || 0) : null;
  const sessionsMom = (prevSessions && prevSessions > 0)
    ? (sessions - prevSessions) / prevSessions * 100 : null;

  // ── PLP Conversion ────────────────────────────────
  const plpConv     = get(latest, 'plp_conversion');
  const prevPlpConv = prev ? get(prev, 'plp_conversion') : null;
  const plpConvMom  = (plpConv != null && prevPlpConv != null)
    ? (plpConv - prevPlpConv) * 100 : null;  // 단위: %p

  // ── Purchase Intent ───────────────────────────────
  const purchase     = get(latest, 'purchase_intent') || get(latest, 'purchase_conversion') || null;
  const prevPurchase = prev ? (get(prev, 'purchase_intent') || get(prev, 'purchase_conversion') || null) : null;

  // ── Organic / External 유입 ───────────────────────
  const organicRaw   = get(latest, 'organic');                       // null if data absent
  const organic      = organicRaw ?? 0;
  const external     = get(latest, 'external_entrance') ?? get(latest, 'external') ?? 0;
  // organicShare is null when organic data is simply absent (avoids false SEO-weak signals)
  const organicShare = (organicRaw != null && external > 0) ? organic / external : null;

  const prevOrganicRaw  = prev ? get(prev, 'organic') : null;
  const prevOrganic     = prevOrganicRaw ?? 0;
  const prevExternal    = prev ? (get(prev, 'external_entrance') ?? get(prev, 'external') ?? 0) : null;
  const prevOrganicShare = (prevOrganicRaw != null && prevExternal && prevExternal > 0)
    ? prevOrganic / prevExternal : null;

  const organicShareMom = (organicShare != null && prevOrganicShare != null)
    ? (organicShare - prevOrganicShare) * 100 : null;  // 단위: %p
  const organicMom      = (prevOrganic && prevOrganic > 0)
    ? (organic - prevOrganic) / prevOrganic * 100 : null;  // 단위: %

  return {
    country: item.country,
    category: item.category,
    sessions, prevSessions, sessionsMom,
    plpConv, prevPlpConv, plpConvMom,
    purchase, prevPurchase,
    organic, external, organicShare, prevOrganicShare,
    organicShareMom, organicMom,
  };
}

// ── 신호 감지 규칙 ────────────────────────────────────────────────
// 임계값 조정이 필요할 경우 이 객체만 수정
const V03_SIGNAL_THRESHOLDS = {
  sessionsMomUp:       10,   // Growth Signal: Sessions MoM ≥ +10%
  plpConvMomUp:         2,   // Growth Signal: PLP MoM ≥ +2%p
  sessionsMomDown:    -10,   // Traffic Drop: Sessions MoM ≤ -10%
  sessionsMinVol:      50,   // Traffic Drop 전제: 최소 세션 수
  organicShareWeak:  0.30,   // SEO Weak: Organic Share < 30%
  organicShareMomDown: -3,   // SEO Weak: Organic Share MoM ≤ -3%p
  convGapThreshold:  0.25,   // Conversion Gap: PLP Conv < 25%
  convGapMinSessions:  80,   // Conversion Gap 전제: 최소 세션 수
  replicationConv:   0.35,   // Performance Highlight: PLP Conv ≥ 35%
  replicationMomFloor: -5,   // Performance Highlight: Sessions MoM ≥ -5%
};

const V03_SIGNAL_RULES = {
  replication: (m, T) =>
    m.plpConv != null && m.plpConv >= T.replicationConv &&
    (m.sessionsMom == null || m.sessionsMom >= T.replicationMomFloor),

  growth: (m, T) =>
    m.sessionsMom != null && m.sessionsMom >= T.sessionsMomUp &&
    m.plpConvMom  != null && m.plpConvMom  >= T.plpConvMomUp,

  traffic_drop: (m, T) =>
    m.sessions >= T.sessionsMinVol &&
    m.sessionsMom != null && m.sessionsMom <= T.sessionsMomDown,

  seo_weak: (m, T) =>
    m.organicShare != null && m.organicShare < T.organicShareWeak &&
    m.organicMom != null && m.organicMom < 0,

  conversion_gap: (m, T) =>
    m.sessions >= T.convGapMinSessions &&
    m.plpConv != null && m.plpConv < T.convGapThreshold,
};

/**
 * 전체 시트에서 신호를 감지하여 정렬된 배열로 반환
 * Satisfaction 신호는 GA 외 survey 데이터 → v03GetSatisfactionSummary() 별도 처리
 */
function v03DetectSignals(sheets, latest, prev) {
  const T = V03_SIGNAL_THRESHOLDS;
  const raw = [];

  for (const [, item] of sheets) {
    const m = v03ComputeSheetMetrics(item, latest, prev);
    if (!m.country || !m.category) continue;
    const target = `${m.country} / ${m.category}`;

    if (V03_SIGNAL_RULES.replication(m, T)) {
      raw.push({ type: 'Performance Highlight', tone: 'good', target, metrics: m,
        desc: `PLP ${(m.plpConv * 100).toFixed(1)}% · Sessions ${m.sessionsMom != null ? (m.sessionsMom >= 0 ? '+' : '') + m.sessionsMom.toFixed(0) + '%' : '—'}` });
    } else if (V03_SIGNAL_RULES.growth(m, T)) {
      raw.push({ type: 'Growth Signal', tone: 'good', target, metrics: m,
        desc: `Sessions +${m.sessionsMom.toFixed(0)}% · PLP +${m.plpConvMom.toFixed(1)}%p` });
    } else if (V03_SIGNAL_RULES.traffic_drop(m, T)) {
      raw.push({ type: 'Traffic Drop', tone: 'risk', target, metrics: m,
        desc: `Session ${m.sessionsMom.toFixed(0)}% MoM` });
    } else if (V03_SIGNAL_RULES.seo_weak(m, T)) {
      raw.push({ type: 'SEO Weak', tone: 'watch', target, metrics: m,
        desc: `Organic ${(m.organicShare * 100).toFixed(0)}% (${m.organicShareMom.toFixed(1)}%p MoM)` });
    } else if (V03_SIGNAL_RULES.conversion_gap(m, T)) {
      raw.push({ type: 'Conversion Gap', tone: 'watch', target, metrics: m,
        desc: `PLP ${(m.plpConv * 100).toFixed(1)}% · ${m.sessions} sessions` });
    }
  }

  // ── 1단계: 국가 × 타입으로 그룹화 (같은 나라의 같은 신호 통합) ──
  const groupMap = new Map();
  for (const s of raw) {
    const key = `${s.type}||${s.metrics.country}`;
    if (!groupMap.has(key)) {
      groupMap.set(key, { ...s, _cats: [s.metrics.category], _allMetrics: [s.metrics] });
    } else {
      const g = groupMap.get(key);
      g._cats.push(s.metrics.category);
      g._allMetrics.push(s.metrics);
    }
  }

  // 그룹 처리: target 업데이트, 대표 desc 생성
  const grouped = Array.from(groupMap.values()).map(g => {
    // 라인업+피처 동일 카테고리 중복 제거
    const cats = [...new Set(g._cats)];
    g.target = cats.length === 1
      ? `${g.metrics.country} / ${cats[0]}`
      : `${g.metrics.country} / ${cats.slice(0,3).join(', ')}${cats.length > 3 ? ' +' + (cats.length - 3) : ''}`;

    if (g.type === 'Traffic Drop') {
      // 가장 큰 낙폭 기준
      const worst = g._allMetrics.reduce((a,b) => a.sessionsMom < b.sessionsMom ? a : b);
      g.desc = cats.length > 1
        ? `Session avg ${(g._allMetrics.reduce((s,m)=>s+(m.sessionsMom||0),0)/g._allMetrics.length).toFixed(0)}% MoM (${cats.length}개 페이지)`
        : `Session ${worst.sessionsMom.toFixed(0)}% MoM`;
    } else if (g.type === 'SEO Weak') {
      g.desc = cats.length > 1
        ? `Organic avg ${(g._allMetrics.reduce((s,m)=>s+(m.organicShare||0)*100,0)/g._allMetrics.length).toFixed(0)}% (${cats.length}개 페이지)`
        : g.desc;
    } else if (g.type === 'Performance Highlight') {
      // 최고 PLP 기준
      const best = g._allMetrics.reduce((a,b) => (a.plpConv||0) > (b.plpConv||0) ? a : b);
      g.desc = cats.length > 1
        ? `Best PLP ${(best.plpConv*100).toFixed(1)}% (${cats.length}개 페이지)`
        : g.desc;
    }
    return g;
  });

  // ── 2단계: 타입별 cap 적용 ──
  // risk/watch: 심각도 순 상위 4개씩
  // good(Replication): 세션 많은 순 상위 5개 + 나머지는 collapsed
  const byType = {};
  for (const s of grouped) {
    if (!byType[s.type]) byType[s.type] = [];
    byType[s.type].push(s);
  }

  // 정렬 함수
  if (byType['Traffic Drop'])
    byType['Traffic Drop'].sort((a,b) => (a.metrics.sessionsMom||0) - (b.metrics.sessionsMom||0));
  if (byType['SEO Weak'])
    byType['SEO Weak'].sort((a,b) => (a.metrics.organicShareMom||0) - (b.metrics.organicShareMom||0));
  if (byType['Conversion Gap'])
    byType['Conversion Gap'].sort((a,b) => (a.metrics.plpConv||1) - (b.metrics.plpConv||1));
  if (byType['Performance Highlight'])
    byType['Performance Highlight'].sort((a,b) => (b.metrics.sessions||0) - (a.metrics.sessions||0));
  if (byType['Growth Signal'])
    byType['Growth Signal'].sort((a,b) => (b.metrics.sessionsMom||0) - (a.metrics.sessionsMom||0));

  const CAP_RISK  = 4;
  const CAP_WATCH = 4;
  const CAP_GOOD  = 5; // Performance Highlight 노출 상한

  const result = [];

  // risk 먼저
  for (const type of ['Traffic Drop']) {
    const list = byType[type] || [];
    result.push(...list.slice(0, CAP_RISK));
  }
  // watch
  for (const type of ['SEO Weak', 'Conversion Gap']) {
    const list = byType[type] || [];
    result.push(...list.slice(0, CAP_WATCH));
  }
  // good: 상위 CAP_GOOD개 + 나머지는 summary 행
  for (const type of ['Growth Signal', 'Performance Highlight']) {
    const list = byType[type] || [];
    const shown = list.slice(0, type === 'Performance Highlight' ? CAP_GOOD : 3);
    result.push(...shown);
    const hidden = list.length - shown.length;
    if (hidden > 0) {
      result.push({
        type: `${type} (+${hidden}개 더)`,
        tone: 'good', target: '', metrics: {},
        desc: `${list.length}개 페이지에서 감지`,
        _collapsed: true, _hiddenCount: hidden, _parentType: type,
        _hiddenItems: list.slice(shown.length),
      });
    }
  }

  return result;
}

/**
 * renderMainInsights()의 signalRows에서 호출
 * 실제 데이터가 있으면 감지 결과 사용, 없으면 mock fallback
 */
function v03GetSignalRows() {
  const latest = getLatestMonth();
  const prev   = getPrevMonth();
  const sheets = getFilteredSheets();

  if (!latest || !sheets.length) return null; // 데이터 없으면 mock fallback

  return v03DetectSignals(sheets, latest, prev);
}

/**
 * 이번 달 핵심 신호를 클러스터 뷰로 반환
 * 신호 건수 pill용 typeCounts + 클러스터 카드용 clusters(최대 6개) 반환
 * 그룹핑 기준: 신호 타입 × 카테고리 (같은 원인/패턴으로 묶음)
 */
/**
 * 이번 달 핵심 신호 — 6개 고정 슬롯 (신호 유형 1개 = 카드 1장)
 * - 각 GA 페이지는 우선순위에 따라 정확히 1개 신호에만 배정 (중복 방지)
 * - Satisfaction Risk는 SAT_DATA에서 별도 집계
 * - 건수 0인 슬롯도 카드는 유지 (빈 상태 표시)
 */
function v03GetClusterData() {
  const latest = getLatestMonth();
  const prev   = getPrevMonth();
  const sheets = getFilteredSheets();
  const T = V03_SIGNAL_THRESHOLDS;

  // ── 1st pass: collect metrics + peer group data ──
  const allSM = [];
  const peerGroups = {};
  for (const [, item] of sheets) {
    const m = v03ComputeSheetMetrics(item, latest, prev);
    if (!m.country || !m.category) continue;
    allSM.push({ item, m });
    const pgKey = `${item.content_type || ''}|${m.category}`;
    if (!peerGroups[pgKey]) peerGroups[pgKey] = { organicShare: [] };
    if (m.organicShare != null) peerGroups[pgKey].organicShare.push(m.organicShare);
  }
  // Compute 25th percentile per peer group (min 4 items)
  const peerP25 = {};
  for (const [k, vals] of Object.entries(peerGroups)) {
    if (vals.organicShare.length >= 4) {
      const s = [...vals.organicShare].sort((a, b) => a - b);
      peerP25[k] = s[Math.floor(0.25 * (s.length - 1))];
    }
  }

  // ── 6 고정 슬롯 정의 ──
  const SLOTS = [
    {
      type: 'Traffic Drop', tone: 'risk', priority: 'high',
      diagnosis: '유입 감소 또는 유입 품질 변화 — 전환 구조보다 유입 경로 우선 점검',
      judgement: '유입 감소 또는 유입 품질 변화 가능성 — 전환 구조보다 유입 경로 우선 점검',
      defaultTasks: [
        { name: '유입 감소 원인 점검', actions: [
          'Organic 및 유입 채널별 세션 변화 확인',
          '내부 링크 및 제품 연결 상태 점검',
          'SEO 문구와 검색 의도 적합성 검토',
        ]},
      ],
      links: [
        { label: '국가별 카드', fn: "switchToPrimaryTab('countries')" },
        { label: '상세 데이터', fn: "switchToPrimaryTab('rawdata');setTimeout(()=>scrollToDetail('acquisition'),100)" },
      ],
    },
    {
      type: 'SEO Weak', tone: 'watch', priority: 'watch',
      diagnosis: '검색 의도와 메타 정보 불일치 점검',
      judgement: '검색 의도와 페이지 문구/메타 정보 불일치 가능성',
      defaultTasks: [
        { name: '검색 최적화 상태 점검', actions: [
          'Search Console 쿼리/노출/클릭 변화 확인',
          '페이지 타이틀, 메타 설명, 앵커 문구 점검',
          '검색 의도와 콘텐츠 구조 적합성 검토',
        ]},
      ],
      links: [
        { label: '상세 데이터', fn: "switchToPrimaryTab('rawdata');setTimeout(()=>scrollToDetail('acquisition'),100)" },
      ],
    },
    {
      type: 'Conversion Gap', tone: 'watch', priority: 'watch',
      diagnosis: 'CTA 흐름 · 제품 진입 구조 확인',
      judgement: '제품 진입 구조 또는 CTA 흐름 점검 필요',
      defaultTasks: [
        { name: 'PLP 전환 구조 점검', actions: [
          'CTA 위치, 문구, 노출 방식 점검',
          '제품 카드 배열 및 가격·사양 노출 순서 확인',
          'PLP 진입 후 이탈 지점 데이터 확인',
        ]},
      ],
      links: [
        { label: '상세 데이터', fn: "switchToPrimaryTab('rawdata');setTimeout(()=>scrollToDetail('conversion'),100)" },
      ],
    },
    {
      type: 'Satisfaction Risk', tone: 'risk', priority: 'high',
      diagnosis: 'Comments 원문 확인 → 부정 이유 상위 항목 집중',
      judgement: '스펙·설명 부족 또는 기대와 콘텐츠 간 간극 가능성',
      defaultTasks: [
        { name: '불만족 원문 확인 및 콘텐츠 개선 검토', actions: [
          'Customer Comments Negative 원문 확인',
          '부정 이유 상위 항목 관련 콘텐츠 보강 검토',
          '스펙 설명, 모델 비교, 추천 기준 개선 포인트 확인',
        ]},
      ],
      links: [
        { label: 'Customer Comments', fn: "switchToSatisfaction({country:'all',category:'all',commentChip:'negative'})" },
      ],
    },
    {
      type: 'Growth Signal', tone: 'good', priority: 'ref',
      diagnosis: '전월 대비 세션·전환이 동시 개선된 대상',
      judgement: '유입과 전환이 함께 개선됨 — 성과 추이 지속 여부 모니터링',
      defaultTasks: [],
      links: [
        { label: '상세 데이터', fn: "switchToPrimaryTab('rawdata');setTimeout(()=>scrollToDetail('overview'),100)" },
      ],
    },
    {
      type: 'Performance Highlight', tone: 'good', priority: 'ref',
      diagnosis: '이번 달 기준 성과와 고객 반응이 모두 양호한 대상',
      judgement: '현재 성과 수준 양호 — 동종 비교군 내 우수 성과 확인',
      defaultTasks: [],
      links: [
        { label: '카테고리 비교', fn: "switchToPrimaryTab('categories')" },
      ],
    },
  ];

  const buckets = {};
  for (const s of SLOTS) buckets[s.type] = [];

  // ── 2nd pass: classify, deduplicate, collect affectedItems ──
  const GA_RULES = [
    ['Traffic Drop',      m => V03_SIGNAL_RULES.traffic_drop(m, T)],
    ['Conversion Gap',    m => V03_SIGNAL_RULES.conversion_gap(m, T)],
    ['SEO Weak',          (m, pgKey) => {
      if (!V03_SIGNAL_RULES.seo_weak(m, T)) return false;
      const p25 = peerP25[pgKey];
      return p25 == null || m.organicShare <= p25;
    }],
    ['Performance Highlight', m => V03_SIGNAL_RULES.replication(m, T)],
    ['Growth Signal',     m => V03_SIGNAL_RULES.growth(m, T)],
  ];

  const fmt = (v, dec = 0) => v != null ? (v >= 0 ? '+' : '') + v.toFixed(dec) : null;

  for (const { item, m } of allSM) {
    const pgKey = `${item.content_type || ''}|${m.category}`;
    let assigned = null;
    const secondary = [];
    for (const [rType, ruleFn] of GA_RULES) {
      if (ruleFn(m, pgKey)) {
        if (!assigned) assigned = rType;
        else secondary.push(rType);
      }
    }
    if (!assigned) continue;
    const ctLabel = item.content_type === 'lineup' ? '라인업'
                  : item.content_type === 'feature_library' ? '피쳐'
                  : (item.content_type || '–');
    buckets[assigned].push({
      country:         m.country,
      contentType:     ctLabel,
      category:        m.category,
      sessionsMomVal:  m.sessionsMom  != null ? (fmt(m.sessionsMom)  + '%') : '–',
      plpConvVal:      m.plpConv      != null ? (m.plpConv * 100).toFixed(1) + '%' : '–',
      organicShareVal: m.organicShare != null ? (m.organicShare * 100).toFixed(0) + '%' : '–',
      organicMomVal:   m.organicMom   != null ? (fmt(m.organicMom)   + '%') : '–',
      secondary, _m: m,
    });
  }

  // ── Satisfaction Risk — country × content_type 기준 ──
  if (SAT_DATA) {
    const p = SAT_DATA.meta?.latest_period;
    const periodResponses = (SAT_DATA.responses||[]).filter(r => r.period === p);
    const groups = {};
    periodResponses.forEach(r => {
      const key = `${r.country}||${r.content_type}`;
      if (!groups[key]) groups[key] = { country: r.country, content_type: r.content_type, items: [] };
      groups[key].items.push(r);
    });
    for (const g of Object.values(groups)) {
      if (g.items.length < 3) continue;
      const total = g.items.length;
      const negItems = g.items.filter(r => r.helpful === 'No');
      const satPct = Math.round((total - negItems.length) / total * 100);
      const negRate = Math.round(negItems.length / total * 100);
      if (satPct >= 75 && negRate <= 20) continue;
      // 주요 부정 이유 (해당 콘텐츠 유형의 실제 항목만)
      const negCounts = {};
      negItems.forEach(r => (r.neg_reasons||[]).forEach(rn => negCounts[rn]=(negCounts[rn]||0)+1));
      const topNegReasons = Object.entries(negCounts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k])=>k);
      // 주요 카테고리
      const catCounts = {};
      g.items.forEach(r => catCounts[r.category]=(catCounts[r.category]||0)+1);
      const topCategory = Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'–';
      buckets['Satisfaction Risk'].push({
        country: g.country,
        content_type: g.content_type,
        contentType: g.content_type === 'lineup' ? 'Line-up Guide' : 'Feature Library',
        category: topCategory,
        satPctVal: satPct + '%',
        negRateVal: negRate + '%',
        topNegReasons,
        secondary: [], _sat: true,
      });
    }
  }

  // ── 슬롯별 카드 데이터 조립 ──
  const signalSlots = SLOTS.map(slot => {
    const items = buckets[slot.type] || [];
    const count = items.length;
    const slug  = v03SignalSlug(slot.type);

    if (count === 0) {
      return {
        type: slot.type, tone: slot.tone, count: 0, empty: true, slug,
        priority: slot.priority, tasks: slot.defaultTasks || [], links: slot.links,
        affectedItems: [], countryLabel: '–', symptomSummary: '', diagnosis: slot.diagnosis,
        signalText: '', judgement: slot.judgement,
      };
    }

    const countries    = [...new Set(items.map(i => i.country))].sort();
    const countryLabel = v03CountryLabel(countries);

    // 대표 아이템 — 최악 지표 기준
    const ms = items.map(i => i._m).filter(Boolean);
    let repM = null, repSat = null;
    if (slot.type === 'Satisfaction Risk') {
      repSat = [...items].sort((a, b) => parseFloat(a.satPctVal) - parseFloat(b.satPctVal))[0];
    } else if (slot.type === 'Traffic Drop') {
      repM = ms.reduce((a, b) => (a.sessionsMom || 0) < (b.sessionsMom || 0) ? a : b);
    } else if (slot.type === 'SEO Weak') {
      repM = ms.reduce((a, b) => (a.organicShare || 1) < (b.organicShare || 1) ? a : b);
    } else if (slot.type === 'Conversion Gap') {
      repM = ms.reduce((a, b) => (a.plpConv || 1) < (b.plpConv || 1) ? a : b);
    } else {
      repM = ms.reduce((a, b) => (a.plpConv || 0) > (b.plpConv || 0) ? a : b);
    }

    // B안: 결론 먼저 + 대표 수치 + 감지 기준
    let symptomSummary, signalText;
    switch (slot.type) {
      case 'Traffic Drop': {
        const v = repM?.sessionsMom;
        const vStr = v != null ? Math.abs(v).toFixed(0) + '%' : '–';
        symptomSummary = `세션 이상 감지 — 전월 대비 ${vStr} 하락`;
        signalText = `${count}개 페이지 Sessions MoM ≤${T.sessionsMomDown}% 감지 (최소 세션 ${T.sessionsMinVol} 이상 페이지 대상)`;
        break;
      }
      case 'SEO Weak': {
        const share = repM?.organicShare != null ? (repM.organicShare * 100).toFixed(0) + '%' : '–';
        const omom  = repM?.organicMom   != null ? Math.abs(repM.organicMom).toFixed(0) + '%' : '–';
        symptomSummary = `Organic 유입 약세 — Share ${share}, Sessions ${omom} 감소`;
        signalText = `${count}개 페이지 Organic Share <${T.organicShareWeak * 100}% AND Organic Sessions MoM 감소 동시 감지 (동종 콘텐츠·카테고리 내 하위 25% 포함 확증)`;
        break;
      }
      case 'Conversion Gap': {
        const plp = repM?.plpConv != null ? (repM.plpConv * 100).toFixed(1) + '%' : '–';
        symptomSummary = `전환 저조 — PLP Conv. ${plp}`;
        signalText = `${count}개 페이지 PLP Conv. <${T.convGapThreshold * 100}% 감지 (최소 세션 ${T.convGapMinSessions} 이상 페이지 대상)`;
        break;
      }
      case 'Satisfaction Risk': {
        const sat = repSat?.satPctVal || '–';
        const neg = repSat?.negRateVal || '–';
        symptomSummary = `만족도 이상 감지 — 만족도 ${sat}, 부정 응답 ${neg}`;
        signalText = `${count}개국 만족도 <75% 또는 부정 응답률 >20% 감지 (응답 수 3건 이상 국가 대상)`;
        break;
      }
      case 'Growth Signal': {
        const mom  = repM?.sessionsMom  != null ? repM.sessionsMom.toFixed(0)  + '%' : '–';
        const pmom = repM?.plpConvMom   != null ? repM.plpConvMom.toFixed(1)   + '%p' : '–';
        symptomSummary = `성과 개선 — 세션 +${mom} MoM · PLP +${pmom}`;
        signalText = `${count}개 페이지 Sessions MoM ≥+${T.sessionsMomUp}% AND PLP MoM ≥+${T.plpConvMomUp}%p 동시 감지`;
        break;
      }
      case 'Performance Highlight': {
        const plp = repM?.plpConv != null ? (repM.plpConv * 100).toFixed(1) + '%' : '–';
        symptomSummary = `성과 우수 — PLP Conv. ${plp}`;
        signalText = `${count}개 페이지 PLP Conv. ≥${T.replicationConv * 100}% AND Sessions MoM ≥${T.replicationMomFloor}% 감지`;
        break;
      }
      default:
        symptomSummary = count + '건';
        signalText = count + '건 감지';
    }

    // ── 동적 판단 — 복합 지표 교차 분석 기반 ──
    let judgement;
    switch (slot.type) {
      case 'Traffic Drop': {
        const secSEO  = items.filter(i => i.secondary.includes('SEO Weak')).length;
        const secConv = items.filter(i => i.secondary.includes('Conversion Gap')).length;
        if (secSEO > 0 && secConv > 0) {
          judgement = `${countries.length}개국에서 세션·Organic·전환 3중 약세 동반. 유입 채널 전반의 구조적 약화 가능성 높음 — 캠페인 의존도 및 Organic 비중 변화를 채널별로 분리 진단 필요`;
        } else if (secSEO > 0) {
          judgement = `세션 하락과 Organic 약화가 ${secSEO}개 페이지에서 동반 발생. 검색 유입 감소가 세션 하락의 주요 원인일 가능성 높음 — 채널별 유입 비중 분리 후 Organic 회복 여부 우선 판단`;
        } else if (secConv > 0) {
          judgement = `세션 하락과 전환 저조가 ${secConv}개 페이지에서 동반. 유입 손실 외 페이지 내 이탈 구조 가능성 — PLP 진입률과 CTA 클릭 흐름 교차 확인`;
        } else {
          judgement = `세션 하락이 ${countries.length}개국에 집중되나 전환 구조는 유지. 유입 경로(채널·캠페인) 변화가 우선 점검 대상 — 동일 카테고리 타 국가와 유입 패턴 비교 후 특이 원인 특정`;
        }
        break;
      }
      case 'SEO Weak': {
        const secTraffic = items.filter(i => i.secondary.includes('Traffic Drop')).length;
        const validShares = items.map(i => parseFloat(i.organicShareVal)).filter(v => !isNaN(v));
        const avgShare = validShares.length ? (validShares.reduce((a, b) => a + b, 0) / validShares.length).toFixed(0) : null;
        if (secTraffic > 0) {
          judgement = `Organic 약화와 세션 하락이 ${secTraffic}개 페이지에서 동반. 검색 노출 감소가 실제 유입 손실로 이어지는 단계 — 메타·타이틀 개선 후 Search Console 노출수 추이 선행 확인`;
        } else {
          judgement = `Organic Share 평균 ${avgShare ?? '–'}%로 낮으나 세션은 유지. 채널 다변화 또는 직접 유입 증가 가능성 — Organic 절대량 MoM 변화를 함께 점검해 실제 손실 여부 판단`;
        }
        break;
      }
      case 'Conversion Gap': {
        const secTraffic = items.filter(i => i.secondary.includes('Traffic Drop')).length;
        const validPlp = items.map(i => parseFloat(i.plpConvVal)).filter(v => !isNaN(v));
        const avgPlp = validPlp.length ? (validPlp.reduce((a, b) => a + b, 0) / validPlp.length).toFixed(1) : null;
        if (secTraffic > 0) {
          judgement = `세션 감소와 전환 저조가 ${secTraffic}개 페이지에서 동반 — 유입·전환 이중 손실 상태. 유입 경로 개선이 선행 과제이며 전환 구조 점검은 유입 회복 이후 단계로 분리`;
        } else {
          judgement = `유입은 유지 중이나 PLP 진입 전환 평균 ${avgPlp ?? '–'}%로 낮음. 세션 대비 PLP 이탈 발생 중 — CTA 위치·문구, 제품 카드 배열, 가격·사양 노출 순서로 이탈 지점 점검`;
        }
        break;
      }
      case 'Satisfaction Risk': {
        const luItems = items.filter(i => i.content_type === 'lineup');
        const ftItems = items.filter(i => i.content_type === 'feature');
        const hasLu = luItems.length > 0;
        const hasFt = ftItems.length > 0;
        const luNegReasons = [...new Set(luItems.flatMap(i => i.topNegReasons||[]))];
        const ftNegReasons = [...new Set(ftItems.flatMap(i => i.topNegReasons||[]))];
        const highNeg = items.filter(i => (parseFloat(i.negRateVal) || 0) > 25).length;
        const parts = [];
        if (hasLu) {
          const focus = luNegReasons.length ? `'${luNegReasons[0]}' 집중` : '부정 이유 확인 필요';
          parts.push(`Line-up Guide: 모델 차이 또는 구매 판단 정보 부족이 부정 응답에 영향을 줄 가능성 — ${focus}`);
        }
        if (hasFt) {
          const focus = ftNegReasons.length ? `'${ftNegReasons[0]}' 집중` : '부정 이유 확인 필요';
          parts.push(`Feature Library: 이미지/영상 또는 기능 설명 전달력이 부정 응답에 영향을 줄 가능성 — ${focus}`);
        }
        if (highNeg > 0) parts.push(`부정 응답률 25% 초과 ${highNeg}건 — Comments 원문 우선 확인 권장`);
        judgement = parts.join(' / ') || '만족도 기준 미달 — 콘텐츠 유형별 부정 이유 원문 확인 후 개선 우선순위 결정';
        break;
      }
      case 'Growth Signal': {
        const secRep = items.filter(i => i.secondary.includes('Performance Highlight')).length;
        if (secRep > 0) {
          judgement = `세션 성장과 PLP 전환 우수가 ${secRep}개 페이지에서 동반. 유입-전환 전 구간 양호 상태 — CTA 구조와 콘텐츠 밀도를 동종 카테고리 저성과 국가의 개선 기준으로 활용 가능`;
        } else {
          judgement = `세션 성장 중이나 전환 개선폭 확인 필요. 유입 품질(Organic vs. Direct 비중)과 PLP 체류 패턴을 병행하면 성과 지속 가능성 판단 가능 — 다음 달 동일 지표 추적 필수`;
        }
        break;
      }
      case 'Performance Highlight': {
        const cats = [...new Set(items.map(i => i.category))].join('·');
        judgement = `${cats} 카테고리에서 PLP 전환과 세션 안정성 동시 확인. 저성과 국가와 CTA 구조·스펙 설명 밀도·제품 카드 배열을 항목별 비교하면 전환 기여 요소 특정 가능 — 확산 적용 전 로컬 제품 라인업 적합성 검토 선행`;
        break;
      }
      default:
        judgement = slot.judgement;
    }

    // ── Satisfaction Risk: dynamic tasks built from neg reason data ──
    let tasks = slot.defaultTasks || [];
    let links = slot.links;
    if (slot.type === 'Satisfaction Risk') {
      const luItems2 = items.filter(i => i.content_type === 'lineup');
      const ftItems2 = items.filter(i => i.content_type === 'feature');
      const hasLu2 = luItems2.length > 0;
      const hasFt2 = ftItems2.length > 0;
      const luTopReason = [...new Set(luItems2.flatMap(i => i.topNegReasons||[]))][0] || null;
      const ftTopReason = [...new Set(ftItems2.flatMap(i => i.topNegReasons||[]))][0] || null;
      const taskActions = ['Customer Comments Negative 원문 확인'];
      if (hasLu2) taskActions.push(luTopReason
        ? `Line-up Guide: '${luTopReason}' 관련 스펙·모델 비교 설명 보강 검토`
        : 'Line-up Guide: 모델 차이·구매 판단 정보 보강 검토');
      if (hasFt2) taskActions.push(ftTopReason
        ? `Feature Library: '${ftTopReason}' 관련 이미지/영상·설명 개선 검토`
        : 'Feature Library: 기능 설명 전달력 및 이미지/영상 품질 개선 검토');
      taskActions.push('부정 이유 상위 항목 관련 콘텐츠 보강 및 스펙 설명 개선 포인트 확인');
      tasks = [{ name: '불만족 원문 확인 및 콘텐츠 개선', actions: taskActions }];
      links = [
        { label: 'Customer Comments', fn: `switchToSatisfaction({country:'all',category:'all',commentChip:'negative'})` },
      ];
    }

    return {
      type: slot.type, tone: slot.tone, count, empty: false, slug,
      priority: slot.priority, tasks, links,
      affectedItems: items, countryLabel, symptomSummary,
      diagnosis: slot.diagnosis, signalText, judgement,
    };
  });

  const typeCounts = {};
  for (const s of signalSlots) typeCounts[s.type] = s.count;

  return { typeCounts, signalSlots };
}
